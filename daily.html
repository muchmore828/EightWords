<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多多萬事屋 | 每日能量占卜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #FFE5D9 0%, #FFF9F5 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: #5E503F;
            padding-bottom: 50px;
        }
        .card-container { 
            perspective: 1000px; 
            width: 300px; 
            aspect-ratio: 2 / 3; 
            margin-bottom: 2rem;
        }
        .card {
            width: 100%; height: 100%;
            position: relative; transition: transform 0.8s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px; border: 8px solid white;
            box-shadow: 0 10px 25px rgba(244, 162, 97, 0.1); display: flex; flex-direction: column;
            overflow: hidden;
        }
        .card-back {
            background-color: #d4a373;
            background-image: url('https://muchmore828.github.io/EightWords/cardback.png');
            background-size: cover; background-position: center;
        }
        .card-front { transform: rotateY(180deg); background: white; }
        
        #result-img { width: 100%; height: auto; object-fit: contain; border-radius: 12px; }
        
        .hidden-prize-glow {
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500 !important;
            border: 8px solid #FFD700 !important;
        }
        .btn-orange { background-color: #F4A261; }
        
        /* 截圖目標區塊的特別設定 */
        #final-capture-area {
            background: transparent;
            padding: 10px;
            border-radius: 24px;
        }
    </style>
</head>
<body class="p-6">

    <div id="test-indicator" class="hidden mb-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full">
        TEST MODE: 可重複抽牌
    </div>

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold" style="color: #8D6E63;">☕ 多多萬事屋</h1>
        <p class="opacity-60 text-xs mt-1" style="color: #BCAAA4;">—— 點擊卡片領取今日能量 ——</p>
    </div>

    <div id="result-wrapper" class="hidden w-full max-w-sm">
        
        <div id="final-capture-area">
            <div class="card-container mx-auto" style="margin-bottom: 1.5rem;">
                <div class="card is-flipped">
                    <div class="card-face card-front p-4 flex flex-col" id="front-face">
                        <img id="result-img" src="" crossOrigin="anonymous">
                        <div class="flex-1 flex items-center justify-center mt-4">
                            <p id="result-quote" class="text-sm leading-relaxed italic text-center px-2" style="color: #8D6E63;"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white/90 backdrop-blur-sm p-6 rounded-3xl border border-white shadow-xl text-center relative overflow-hidden">
                <div id="hidden-tag" class="hidden absolute top-0 right-0 bg-yellow-400 text-white text-[10px] px-2 py-1 font-bold">LUCKY!</div>
                
                <h3 class="text-stone-400 text-[10px] font-bold uppercase tracking-widest mb-2">今日宇宙推薦</h3>
                <p id="result-intro" class="text-xs text-stone-500 mb-2 leading-relaxed px-2"></p>
                <p id="result-drink" class="text-stone-700 font-bold text-xl mb-4"></p>
                
                <div class="border-t border-dashed border-stone-200 pt-4">
                    <p id="date-info" class="text-[10px] text-stone-400 font-mono"></p>
                    <p id="expiry-info" class="text-[11px] text-orange-500 font-bold mt-1"></p>
                    <p class="text-[9px] text-stone-300 mt-3">苗栗縣後龍鎮 | 多肉咖啡 Muchmore Cafe</p>
                </div>
            </div>
        </div>

        <div class="mt-6 space-y-3 px-2">
            <button onclick="captureTicket()" class="w-full py-4 bg-stone-800 text-white rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg active:scale-95 transition">
                <span>🖼️ 下載能量憑證 (截圖分享)</span>
            </button>
            <button onclick="shareToLine()" class="w-full py-3 bg-[#06C755] text-white rounded-xl font-bold flex items-center justify-center gap-2 opacity-80">
                <span>LINE 傳送文字給朋友</span>
            </button>
            <a href="https://lin.ee/NBCScpf" class="block text-center text-stone-400 text-sm underline pt-2">返回多肉咖啡官方帳號</a>
        </div>
    </div>

    <div id="init-draw-zone" class="card-container">
        <div class="card" onclick="drawToday()">
            <div class="card-face card-back"></div> 
        </div>
    </div>

    <script>
        const IS_TEST_MODE = true; 
        const probabilityConfig = {
            hiddenPrizeChance: 40,
            normalDiscount: "10 元折扣",
            hiddenDiscount: "50 元特大驚喜"
        };

        const cards = [
            { name: "0. 愚者", img: "https://muchmore828.github.io/EightWords/0_The_Fool.png" },
            { name: "1. 魔術師", img: "https://muchmore828.github.io/EightWords/1_The_Magician.png" },
            { name: "2. 女教皇", img: "https://muchmore828.github.io/EightWords/2_The_High_Priestess.png" },
            { name: "3. 皇后", img: "https://muchmore828.github.io/EightWords/3_The_Empress.png" },
            { name: "4. 皇帝", img: "https://muchmore828.github.io/EightWords/4_The_Emperor.png" },
            { name: "5. 教皇", img: "https://muchmore828.github.io/EightWords/5_The_Hierophant.png" },
            { name: "6. 戀人", img: "https://muchmore828.github.io/EightWords/6_The_Lovers.png" },
            { name: "7. 戰車", img: "https://muchmore828.github.io/EightWords/7_The_Chariot.png" },
            { name: "8. 力量", img: "https://muchmore828.github.io/EightWords/8_Strength.png" },
            { name: "21. 世界", img: "https://muchmore828.github.io/EightWords/21_World.png" }
            // ... 其他卡片略過，請老闆自行補回 ...
        ];

        const drinks = ["可爾必思","嘉年華鬆餅","美式咖啡","多肉布丁","拿鐵咖啡","榛果巧克力鬆餅"];
        const quotes = ["當你放慢思緒，答案自然會浮現。","像貓一樣，在陽光最好的地方，專心地虛度光陰。","宇宙從不辜負一個認真對待「現在」的人。"];

        window.onload = () => {
            if (IS_TEST_MODE) document.getElementById('test-indicator').classList.remove('hidden');
            const history = JSON.parse(localStorage.getItem('muchmore_daily_draw_0424'));
            const today = new Date().toLocaleDateString();
            if (!IS_TEST_MODE && history && history.date === today) {
                showFinal(history.data);
            }
        };

        function drawToday() {
            const roll = Math.floor(Math.random() * 100) + 1;
            const isHidden = roll <= probabilityConfig.hiddenPrizeChance;
            const discount = isHidden ? probabilityConfig.hiddenDiscount : probabilityConfig.normalDiscount;
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            const randomDrink = drinks[Math.floor(Math.random() * drinks.length)];
            const now = new Date();
            const expiry = new Date();
            expiry.setDate(now.getDate() + 2);
            
            const resultData = { 
                date: now.toLocaleDateString(),
                expiry: expiry.toLocaleDateString(),
                quote: randomQuote, 
                drink: randomDrink, 
                img: randomCard.img,
                discount: discount,
                isHidden: isHidden
            };
            
            if (!IS_TEST_MODE) localStorage.setItem('muchmore_daily_draw_0424', JSON.stringify({ date: now.toLocaleDateString(), data: resultData }));
            showFinal(resultData);
        }

        function showFinal(data) {
            document.getElementById('init-draw-zone').classList.add('hidden');
            document.getElementById('result-wrapper').classList.remove('hidden');
            
            document.getElementById('result-img').src = data.img;
            document.getElementById('result-quote').innerText = `「${data.quote}」`;
            document.getElementById('result-drink').innerText = `${data.drink} (${data.discount})`;
            document.getElementById('date-info').innerText = `占卜日期：${data.date}`;
            document.getElementById('expiry-info').innerText = `兌換期限至：${data.expiry}`;
            
            document.getElementById('result-intro').innerText = data.isHidden 
                ? "【驚喜隱藏版！】宇宙今天特別眷顧你：" 
                : "這份餐點與今日能量最契合，出示畫面享：";

            if (data.isHidden) {
                document.getElementById('hidden-tag').classList.remove('hidden');
                document.getElementById('front-face').classList.add('hidden-prize-glow');
            }
        }

        // --- 📸 核心：所見即所得截圖功能 ---
        function captureTicket() {
            const target = document.getElementById('final-capture-area');
            const btn = event.currentTarget;
            btn.innerText = "✨ 正在產生憑證...";
            
            html2canvas(target, {
                useCORS: true,
                scale: 3, // 提高品質，讓客人發限動不模糊
                backgroundColor: "#FFF4F0" // 截圖底色
            }).then(canvas => {
                const imgData = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `多多萬事屋_能量憑證.png`;
                link.href = imgData;
                link.click();
                
                btn.innerText = "🖼️ 下載能量憑證 (截圖分享)";
                alert("憑證已生成！\n\n請將圖片儲存並分享給朋友，\n到店出示此圖即可享有宇宙推薦優惠！");
            });
        }

        function shareToLine() {
            const quote = document.getElementById('result-quote').innerText;
            const drink = document.getElementById('result-drink').innerText;
            const officialLineUrl = "https://lin.ee/NBCScpf";
            const shareText = `🔮 多多萬事屋 | 今日能量占卜\n\n「${quote}」\n宇宙推薦：${drink}\n\n看你的今日能量建議 👇\n${officialLineUrl}`;
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
        }
    </script>
</body>
</html>
