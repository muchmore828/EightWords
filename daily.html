<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多多萬事屋 | 每日能量占卜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }
        /* 粉彩感卡片 */
        .card-container { perspective: 1000px; width: 240px; height: 380px; }
        .card {
            width: 100%; height: 100%;
            position: relative; transition: transform 0.8s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px; border: 8px solid white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        /* 牌背：粉彩筆觸感 */
        .card-back {
            background: #d4a373; /* 或放入你的 Kento 牌背圖 */
            display: flex; align-items: center; justify-content: center;
        }
        /* 牌面 */
        .card-front { transform: rotateY(180deg); background: white; }
        
        .soft-shadow { box-shadow: 0 4px 15px rgba(212, 163, 115, 0.2); }
    </style>
</head>
<body class="p-6">

    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold text-stone-700">☕ 多多萬事屋</h1>
        <p class="text-stone-400 text-sm mt-1">—— 領取你的今日能量建議 ——</p>
    </div>

    <div id="draw-zone" class="card-container mb-8">
        <div class="card" id="main-card" onclick="drawToday()">
            <div class="card-face card-back text-white text-4xl">🐾</div>
            <div class="card-face card-front flex flex-col p-4">
                <img id="result-img" src="" class="w-full h-48 object-cover rounded-lg mb-4">
                <h2 id="result-name" class="text-center font-bold text-lg text-stone-700"></h2>
                <div class="flex-1 flex items-center justify-center">
                    <p id="result-quote" class="text-sm text-stone-500 leading-relaxed italic text-center px-2"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="result-detail" class="hidden w-full max-w-sm">
        <div class="bg-white/80 backdrop-blur-sm p-5 rounded-2xl border border-white soft-shadow mb-6 text-center">
            <h3 class="text-stone-400 text-xs font-bold uppercase tracking-widest mb-2">今日推薦飲品</h3>
            <p id="result-drink" class="text-stone-700 font-bold text-lg"></p>
        </div>
        <p class="text-center text-xs text-stone-400 mt-4">能量訊息每日重置，明天再來看看吧！</p>
    </div>

    <script>
        // 1. 設定 22 張塔羅牌 (這裡簡略列出，你可以自行填入對應圖片網址)
        const cards = [
            { name: "0. 愚者", drink: "阿尼亞 (驚喜特調)", img: "https://via.placeholder.com/200x300?text=The+Fool" },
            { name: "1. 魔術師", drink: "摩卡咖啡 (層次豐富)", img: "https://via.placeholder.com/200x300?text=The+Magician" },
            { name: "2. 女教皇", drink: "高山冬片茶 (沉穩冷靜)", img: "https://via.placeholder.com/200x300?text=The+High+Priestess" },
            // ... 請補齊 22 張
        ];

        // 2. 設定 30 句心法金句
        const quotes = [
            "當你放慢呼吸，答案自然會浮現。",
            "今日適合在忙碌中，為自己留出十分鐘的空白。",
            "宇宙的安排總有其美意，即便是暫時的停留。",
            "你的才華就像剛研磨的咖啡豆，需要熱情來沖開。",
            "有時候，不採取行動也是一種最有力的行動。",
            // ... 請補齊 30 句
        ];

        const cardEl = document.getElementById('main-card');
        const STORAGE_KEY = 'muchmore_daily_draw';

        window.onload = checkHistory;

        function checkHistory() {
            const today = new Date().toLocaleDateString();
            const history = JSON.parse(localStorage.getItem(STORAGE_KEY));

            if (history && history.date === today) {
                displayResult(history.data);
                cardEl.classList.add('is-flipped');
                cardEl.onclick = null; // 禁止重複點擊
            }
        }

        function drawToday() {
            if (cardEl.classList.contains('is-flipped')) return;

            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            const resultData = {
                name: randomCard.name,
                quote: randomQuote,
                drink: randomCard.drink,
                img: randomCard.img
            };

            // 儲存結果到 LocalStorage
            const today = new Date().toLocaleDateString();
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                date: today,
                data: resultData
            }));

            displayResult(resultData);
            cardEl.classList.add('is-flipped');
        }

        function displayResult(data) {
            document.getElementById('result-name').innerText = data.name;
            document.getElementById('result-quote').innerText = `「${data.quote}」`;
            document.getElementById('result-drink').innerText = data.drink;
            document.getElementById('result-img').src = data.img;
            document.getElementById('result-detail').classList.remove('hidden');
        }
    </script>
</body>
</html>
