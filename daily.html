<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多多萬事屋 | 每日能量占卜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Noto Sans TC', sans-serif; 
            background: linear-gradient(135deg, #FFE5D9 0%, #FFF9F5 100%);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            color: #5E503F;
        }
        .card-container { 
            perspective: 1000px; 
            width: 300px; 
            aspect-ratio: 2 / 3; 
            margin-bottom: 2rem;
        }
        .card {
            width: 100%; height: 100%;
            position: relative; transition: transform 0.8s;
            transform-style: preserve-3d; cursor: pointer;
        }
        .card.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden;
            border-radius: 20px; border: 8px solid white;
            box-shadow: 0 10px 25px rgba(244, 162, 97, 0.2); display: flex; flex-direction: column;
            overflow: hidden;
        }
        .card-back {
            background-color: #d4a373;
            background-image: url('https://muchmore828.github.io/EightWords/cardback.png');
            background-size: cover; background-position: center;
        }
        .card-front { transform: rotateY(180deg); background: white; overflow-y: auto; }
        .card-front::-webkit-scrollbar { width: 0px; }
        #result-img { width: 100%; height: auto; object-fit: contain; border-radius: 12px; max-height: 70%; }
        
        /* 隱藏版發光效果 */
        .hidden-prize-glow {
            box-shadow: 0 0 20px #FFD700, 0 0 40px #FFA500 !important;
            border: 8px solid #FFD700 !important;
        }
        .btn-orange { background-color: #F4A261; }
    </style>
</head>
<body class="p-6">

    <div id="test-indicator" class="hidden mb-2 bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full animate-pulse">
        TEST MODE: 可重複抽牌
    </div>

    <div class="text-center mb-8">
        <h1 class="text-2xl font-bold" style="color: #8D6E63;">☕ 多多萬事屋</h1>
        <p class="opacity-60 text-sm mt-1" style="color: #BCAAA4;">—— 默數三秒！領取今日能量建議 ——</p>
    </div>

    <div id="draw-zone" class="card-container">
        <div class="card" id="main-card" onclick="drawToday()">
            <div class="card-face card-back"></div> 
            <div class="card-face card-front p-4 flex flex-col" id="front-face">
                <img id="result-img" src="" alt="能量卡片" onerror="this.src='https://via.placeholder.com/400x600?text=Card+Image'">
                <div class="flex-1 flex items-center justify-center mt-4">
                    <p id="result-quote" class="text-sm leading-relaxed italic text-center px-2" style="color: #8D6E63;"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="result-detail" class="hidden w-full max-w-sm space-y-4">
        <div class="bg-white/90 backdrop-blur-sm p-5 rounded-2xl border border-white shadow-xl text-center relative overflow-hidden">
            <div id="hidden-tag" class="hidden absolute top-0 right-0 bg-yellow-400 text-white text-[10px] px-2 py-1 font-bold">LUCKY!</div>
            
            <h3 class="text-stone-400 text-xs font-bold uppercase tracking-widest mb-2">今日宇宙推薦</h3>
            <p id="result-intro" class="text-xs text-stone-500 mb-2 leading-relaxed px-4"></p>
            <p id="result-drink" class="text-stone-700 font-bold text-xl mb-4"></p>
            
            <div class="border-t border-dashed border-stone-200 pt-4 mb-4">
                <p id="date-info" class="text-[10px] text-stone-400 font-mono"></p>
                <p id="expiry-info" class="text-[11px] text-orange-500 font-bold mt-1"></p>
            </div>

            <div class="flex flex-col gap-3">
                <button onclick="shareToLine()" class="w-full py-3 bg-[#06C755] text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#05b34c]">
                    <span>LINE 分享給好友</span>
                </button>
                <a href="https://lin.ee/NBCScpf" class="w-full py-3 btn-orange text-white rounded-xl font-bold flex items-center justify-center gap-2 hover:opacity-90">
                    <span>回多肉咖啡官方帳號</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 🛠️ 測試模式與機率設定區
        // ==========================================
        
        // 1. 測試模式開關 (正式上線前請改為 false)
        const IS_TEST_MODE = true; 

        // 2. 機率與折扣設定 (老闆您隨時可以調整這裡)
        const probabilityConfig = {
            hiddenPrizeChance: 40, // 隱藏版機率 (單位：%，例如寫 5 代表 5%)
            normalDiscount: "10 元折扣",
            hiddenDiscount: "50 元特大幸運驚喜"
        };

        // ==========================================
        // 📜 文字內容清單 (換行排列，方便維護)
        // ==========================================

        const cards = [
            { name: "0. 愚者", img: "https://muchmore828.github.io/EightWords/0_The_Fool.png" },
            { name: "1. 魔術師", img: "https://muchmore828.github.io/EightWords/1_The_Magician.png" },
            { name: "2. 女教皇", img: "https://muchmore828.github.io/EightWords/2_The_High_Priestess.png" },
            { name: "3. 皇后", img: "https://muchmore828.github.io/EightWords/3_The_Empress.png" },
            { name: "4. 皇帝", img: "https://muchmore828.github.io/EightWords/4_The_Emperor.png" },
            { name: "5. 教皇", img: "https://muchmore828.github.io/EightWords/5_The_Hierophant.png" },
            { name: "6. 戀人", img: "https://muchmore828.github.io/EightWords/6_The_Lovers.png" },
            { name: "7. 戰車", img: "https://muchmore828.github.io/EightWords/7_The_Chariot.png" },
            { name: "8. 力量", img: "https://muchmore828.github.io/EightWords/8_Strength.png" },
            { name: "9. 隱士", img: "https://via.placeholder.com/400x600?text=9_Hermit" },
            { name: "10. 命運之輪", img: "https://via.placeholder.com/400x600?text=10_Wheel" },
            { name: "11. 正義", img: "https://via.placeholder.com/400x600?text=11_Justice" },
            { name: "12. 吊人", img: "https://via.placeholder.com/400x600?text=12_HangedMan" },
            { name: "13. 死神", img: "https://via.placeholder.com/400x600?text=13_Death" },
            { name: "14. 節制", img: "https://via.placeholder.com/400x600?text=14_Temperance" },
            { name: "15. 惡魔", img: "https://via.placeholder.com/400x600?text=15_Devil" },
            { name: "16. 高塔", img: "https://via.placeholder.com/400x600?text=16_Tower" },
            { name: "17. 星真", img: "https://via.placeholder.com/400x600?text=17_Star" },
            { name: "18. 月亮", img: "https://via.placeholder.com/400x600?text=18_Moon" },
            { name: "19. 太陽", img: "https://via.placeholder.com/400x600?text=19_Sun" },
            { name: "20. 審判", img: "https://via.placeholder.com/400x600?text=20_Judgement" },
            { name: "21. 世界", img: "https://via.placeholder.com/400x600?text=21_World" }
        ];

        const drinks = [
            "可爾必思",
            "嘉年華鬆餅",
            "麝香葡萄",
            "草莓果醬鬆餅",
            "美式咖啡",
            "高山冬片",
            "紅茶拿鐵",
            "夏戀",
            "多肉布丁",
            "單品咖啡",
            "阿尼亞",
            "拿鐵咖啡",
            "香魚片",
            "春梅",
            "綠茶拿鐵",
            "榛果巧克力鬆餅",
            "摩卡咖啡",
            "草莓果茶",
            "香絲",
            "原味鬆餅",
            "可可牛奶",
            "Ｑ心麻糬鬆餅"
        ];

        const quotes = [
            "當你放慢思緒，答案自然會浮現。",
            "今日適合在忙碌中，為自己留出十分鐘的空白。",
            "宇宙的安排總有其美意，即便是暫時的停留。",
            "你的才華就像剛研磨的咖啡豆，需要熱情來沖開。",
            "有時候，不採取行動也是一種最有力的行動。",
            "每一滴萃取的苦澀，都是為了襯托後續的回甘。",
            "心亂的時候，就把目光收回到眼前的這杯茶。",
            "暫時的迷路，是為了讓你遇見未曾看過的風景。",
            "生活不是為了趕路，而是為了感受路。",
            "把生活調成靜音，你才能聽見靈魂的耳語。",
            "所有的「來不及」，其實都是另一種「剛剛好」。",
            "像貓一樣，在陽光最好的地方，專心地虛度光陰。",
            "練習對外界的雜音微笑，然後優雅地轉身。",
            "既然無法控制風的方向，那就調整帆的角度。",
            "最好的狀態，是心裡有事，但臉上無痕。",
            "你的價值，不需要透過別人的肯定來「定義」。",
            "偶爾的脆弱並不可恥，它是靈魂在提醒你該休息了。",
            "成長是一場與自己的對話，不必急著給世界答案。",
            "保持一點「必要的任性」，是愛自己最直觀的方式。",
            "那些看似平淡的重複，正是支撐夢想的骨架。",
            "與其追逐光，不如讓自己成為發光的人。",
            "你的善良必須帶點鋒芒，才不至於在溫柔中迷失。",
            "完美的包裝或許迷人，但真實的靈魂更有飽足感。",
            "允許自己有不開心的權利，這也是一種自由。",
            "把期待調低，快樂自然就會溢出來。",
            "命運的劇本雖然寫好，但演出的語氣由你決定。",
            "順著流走，你會發現阻力其實是另一種推力。",
            "每一場相遇都有其保存期限，所以請在當下盡興。",
            "宇宙從不辜負一個認真對待「現在」的人。",
            "所有的失去，最終都會以另一種形式歸來。",
            "保持開放的心態，好運才會找到入口。",
            "練習把「為什麼發生在我身上」改成「這想教會我什麼」。",
            "穩定自己的頻率，世界自然會與你共振。",
            "當你開始愛自己，全宇宙都會為你讓路。",
            "今天的遺憾，是明天驚喜的伏筆。"
        ];

        // ==========================================
        // ⚙️ 核心邏輯區域 (由我維護)
        // ==========================================

        const cardEl = document.getElementById('main-card');
        const STORAGE_KEY = 'muchmore_daily_draw_0424';

        window.onload = () => {
            if (IS_TEST_MODE) {
                document.getElementById('test-indicator').classList.remove('hidden');
            }
            checkHistory();
        };

        function checkHistory() {
            // 測試模式下，每次都重新開始
            if (IS_TEST_MODE) return; 

            const history = JSON.parse(localStorage.getItem(STORAGE_KEY));
            const today = new Date().toLocaleDateString();
            if (history && history.date === today) {
                displayResult(history.data);
                cardEl.classList.add('is-flipped');
                cardEl.onclick = null;
            }
        }

        function drawToday() {
            if (cardEl.classList.contains('is-flipped')) return;

            // 1. 機率投骰子
            const roll = Math.floor(Math.random() * 100) + 1;
            const isHidden = roll <= probabilityConfig.hiddenPrizeChance;
            const discount = isHidden ? probabilityConfig.hiddenDiscount : probabilityConfig.normalDiscount;

            // 2. 抽籤
            const randomCard = cards[Math.floor(Math.random() * cards.length)];
            const randomQuote = quotes[Math.floor(Math.random() * quotes.length)];
            const randomDrink = drinks[Math.floor(Math.random() * drinks.length)];
            
            // 3. 計算 D+2 期限
            const now = new Date();
            const expiry = new Date();
            expiry.setDate(now.getDate() + 2);
            
            const resultData = { 
                date: now.toLocaleDateString(),
                expiry: expiry.toLocaleDateString(),
                name: randomCard.name, 
                quote: randomQuote, 
                drink: randomDrink, 
                img: randomCard.img,
                discount: discount,
                isHidden: isHidden
            };
            
            // 存檔 (非測試模式時)
            if (!IS_TEST_MODE) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: now.toLocaleDateString(), data: resultData }));
            }
            
            displayResult(resultData);
            cardEl.classList.add('is-flipped');
        }

        function displayResult(data) {
            document.getElementById('result-img').src = data.img;
            document.getElementById('result-quote').innerText = `「${data.quote}」`;
            
            const introText = data.isHidden 
                ? "【驚喜隱藏版！】宇宙今天特別眷顧你，不僅推薦這份餐點，更送上超大幸運回饋！" 
                : "這份餐點與今日能量最契合，出示此畫面即享折扣回饋：";
            
            document.getElementById('result-intro').innerText = introText;
            document.getElementById('result-drink').innerText = `${data.drink} (${data.discount})`;
            document.getElementById('date-info').innerText = `占卜日期：${data.date}`;
            document.getElementById('expiry-info').innerText = `兌換期限至：${data.expiry}`;

            if (data.isHidden) {
                document.getElementById('hidden-tag').classList.remove('hidden');
                document.getElementById('front-face').classList.add('hidden-prize-glow');
            } else {
                document.getElementById('hidden-tag').classList.add('hidden');
                document.getElementById('front-face').classList.remove('hidden-prize-glow');
            }

            document.getElementById('result-detail').classList.remove('hidden');
        }

        function shareToLine() {
            const quote = document.getElementById('result-quote').innerText;
            const drink = document.getElementById('result-drink').innerText;
            const expiry = document.getElementById('expiry-info').innerText;
            const officialLineUrl = "https://lin.ee/NBCScpf";
            
            const shareText = `🔮 多多萬事屋 | 每日占卜\n\n能量訊息：${quote}\n宇宙推薦：${drink}\n${expiry}\n\n想知道你的今日能量嗎？趕快點擊占卜 👇\n${officialLineUrl}`;
            window.location.href = `https://line.me/R/msg/text/?${encodeURIComponent(shareText)}`;
        }
    </script>
</body>
</html>
