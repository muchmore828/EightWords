<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡 Muchmore Cafe | 數位導覽頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #fff0f0;
            --pastel-orange: #ffecd2;
            --pastel-cream: #fdfcf0;
            --accent-orange: #ff9a76;
            --text-gray: #6d6d6d;
            --success-green: #e8f5e9;
            --full-red: #ffebeb;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--pastel-cream);
            color: var(--text-gray);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部看板 */
        .hero-section {
            width: 100%;
            background: linear-gradient(180deg, var(--pastel-orange), var(--pastel-pink));
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .cat-mascot {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            background: white;
            font-weight: bold;
            color: var(--accent-orange);
            margin-top: 10px;
        }

        /* 內容容器 */
        .container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto 100px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 154, 118, 0.1);
        }

        h3 {
            color: var(--accent-orange);
            margin: 0 0 15px 0;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* 行事曆樣式 */
        .calendar-header {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-gray);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .cal-day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            transition: 0.2s;
        }

        .cal-label { font-weight: bold; border: none; background: transparent; }
        
        /* 狀態顏色 */
        .status-off { background-color: #f5f5f5; color: #ccc; border: none; }
        .status-available { background-color: var(--success-green); border: 1.5px solid #a5d6a7; cursor: pointer; }
        .status-full { background-color: var(--full-red); color: #ef9a9a; border: none; }

        /* 預約時段彈出區 */
        #slot-details {
            margin-top: 15px;
            padding: 15px;
            background: var(--pastel-orange);
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .slot-btn {
            background: white;
            color: var(--accent-orange);
            padding: 8px 12px;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid var(--accent-orange);
        }

        /* 底部導覽 */
        .footer-nav {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .nav-item { text-decoration: none; color: var(--text-gray); font-size: 0.8em; text-align: center; }
        .nav-icon { display: block; font-size: 1.5em; margin-bottom: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="cat-mascot">🐈</div>
        <h2 id="greeting-text">Loading...</h2>
        <div id="shop-status" class="status-badge">同步店鋪狀態中...</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🐾 貓罐罐集點卡</h3>
            <p style="font-size: 0.9em; margin-bottom: 15px;">實體卡數位化！消費即累積，換取諮詢優惠與咖啡。</p>
            <a href="YOUR_LINE_CARD_URL" style="background:var(--accent-orange); color:white; text-decoration:none; display:block; text-align:center; padding:12px; border-radius:15px; font-weight:bold;">打開我的集點卡</a>
        </div>

        <div class="card">
            <h3>📅 營業與預約</h3>
            <div id="month-label" class="calendar-header">讀取中...</div>
            <div id="calendar-grid" class="calendar-grid"></div>
            
            <div id="slot-details">
                <p id="selected-date-info" style="margin: 0 0 10px 0; font-weight: bold; font-size: 0.9em;"></p>
                <div id="slots-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>
            <p style="font-size: 0.75em; color: #aaa; margin-top: 15px; text-align: center;">💡 綠色日期代表尚有諮詢空檔</p>
        </div>
    </div>

    <nav class="footer-nav">
        <a href="#" class="nav-item"><span class="nav-icon">☕</span>數位點餐</a>
        <a href="#" class="nav-item"><span class="nav-icon">🔮</span>預約諮詢</a>
        <a href="#" class="nav-item"><span class="nav-icon">📸</span>Instagram</a>
    </nav>

    <script>
        // 請在此處貼上部署後得到的 Web App URL
        const API_URL = "https://script.google.com/macros/s/AKfycbylNOUexoQZKY3EH4iWAft82GjH0aPMBOEUzmmHe5GpSbJPhdSZU4KbyFFiPRU70Ri8/exec";

        async function init() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderCalendar(data);
                updateHeroStatus(data);
            } catch (e) {
                document.getElementById('greeting-text').innerText = "連線失敗";
                console.error(e);
            }
        }

        function renderCalendar(data) {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('month-label');
            const now = new Date();
            const year = now.getFullYear();
            const month = now.getMonth(); // 當前月份

            monthLabel.innerText = `${year}年 ${month + 1}月`;
            
            // 基礎日曆邏輯
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            grid.innerHTML = '';
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];
            weekDays.forEach(d => grid.innerHTML += `<div class="cal-day cal-label">${d}</div>`);

            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

            // 資料轉換為 Map
            const scheduleMap = {};
            data.forEach(item => {
                const d = new Date(item.Date);
                const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
                scheduleMap[key] = item;
            });

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayData = scheduleMap[dateKey];
                const dayOfWeek = new Date(year, month, d).getDay();
                
                let className = "cal-day";
                let statusText = "";
                let onClickStr = "";

                if (dayData) {
                    if (dayData.Type === "固定公休" || dayData.Type === "店休日") {
                        className += " status-off";
                    } else if (dayData.Slots === "full") {
                        className += " status-full";
                        statusText = "<span style='font-size:0.7em'>滿</span>";
                    } else if (dayData.Slots) {
                        className += " status-available";
                        const slots = dayData.Slots.split(',');
                        const hours = dayData.Hours || "14:00~19:00";
                        onClickStr = `showSlots('${d}', '${hours}', ${JSON.stringify(slots)})`;
                    }
                } else if (dayOfWeek === 1) {
                    className += " status-off";
                }

                grid.innerHTML += `<div class="${className}" onclick="${onClickStr}">${d}${statusText}</div>`;
            }
        }

        function showSlots(day, hours, slots) {
            const box = document.getElementById('slot-details');
            document.getElementById('selected-date-info').innerText = `📅 ${day}日 營業時間 ${hours}`;
            const container = document.getElementById('slots-container');
            container.innerHTML = '';
            slots.forEach(s => {
                container.innerHTML += `<a href="#" class="slot-btn">${s.trim()}</a>`;
            });
            box.style.display = 'block';
        }

        function updateHeroStatus(data) {
            const now = new Date();
            const dateKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
            const todayData = data.find(item => {
                const d = new Date(item.Date);
                return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` === dateKey;
            });

            const badge = document.getElementById('shop-status');
            const greet = document.getElementById('greeting-text');

            if (todayData && (todayData.Type === "固定公休" || todayData.Type === "店休日")) {
                badge.innerText = "今日店休中 😴";
                badge.style.color = "#ccc";
                greet.innerText = "肯多店長休息中";
            } else {
                badge.innerText = "今日熱情營業 ✨";
                greet.innerText = "下午好，想喝點什麼？";
            }
        }

        init();
    </script>
</body>
</html>
