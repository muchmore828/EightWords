<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡 | Muchmore Cafe</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #fff0f0;
            --pastel-orange: #ffecd2;
            --pastel-cream: #fdfcf0;
            --accent-orange: #ff9a76;
            --text-gray: #6d6d6d;
            --booked-blue: #e3f2fd;
            --booked-text: #2196f3;
            --off-red: #ffebeb;
            --off-text: #ff6b6b;
        }
        /* 修正 1：增加 padding-bottom 確保捲動到底部時不會被點餐條遮住付款方式 */
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--pastel-cream); padding-bottom: 180px; }
        
        /* 視圖切換邏輯 */
        .view-section { display: none; animation: fadeIn 0.4s ease; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 點餐頁專用樣式 */
        .qty-btn { width: 26px; height: 26px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .minus-btn { background-color: #E9ECEF; color: #495057; }
        .hot-theme { background-color: #E53935; color: white; } 
        .cold-theme { background-color: #1E88E5; color: white; } 
        .default-theme { background-color: #FB8C00; color: white; } 
        .option-card input:checked + div { border-color: #2E7D32; background-color: #E8F5E9; color: #1B5E20; }

        /* 日曆專用樣式 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .cal-day { aspect-ratio: 1/1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.85em; border-radius: 12px; background: white; border: 1px solid #f0f0f0; cursor: pointer; }
        .status-off { background-color: var(--off-red) !important; color: var(--off-text) !important; }
        .status-booked { background-color: var(--booked-blue) !important; color: var(--booked-text) !important; }
        
        /* 底部導航 */
        .footer-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px 0; border-radius: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100; }
        .nav-item { border:none; background:none; color: var(--text-gray); font-size: 0.85em; text-align: center; cursor: pointer; }
        .nav-item.active { color: var(--accent-orange); font-weight: bold; }
        .nav-icon { display: block; font-size: 1.4em; }
    </style>
</head>
<body>

    <header class="bg-stone-800 text-white p-6 rounded-b-[40px] shadow-lg text-center">
        <div class="flex justify-center mb-3">
            <img src="https://muchmore828.github.io/EightWords/logo.png" class="w-16 h-16 rounded-full border-2 border-white object-cover" alt="Kento">
        </div>
        <h1 id="greeting-text" class="text-lg font-bold">下午好，想喝點什麼？</h1>
        <div id="shop-status-badge" class="mt-2 inline-block px-4 py-1 rounded-full bg-stone-700 text-xs border border-stone-600">
            同步狀態中...
        </div>
    </header>

    <main class="container mx-auto px-4 mt-6">
        
        <section id="view-home" class="view-section active space-y-6">
            <div class="bg-white p-5 rounded-3xl shadow-sm border border-orange-50">
                <h3 class="text-orange-400 font-bold flex items-center gap-2 mb-2">🐾 胖多多集點卡</h3>
                <p class="text-sm text-gray-500 mb-4">實體卡數位化！<br>餐飲消費100元即可累積1點<br>每5點可獲得50元折抵券<br>集滿15點享一年餐飲九折優惠！</p>
                <a href="https://u.lin.ee/sFWqYyn" class="block w-full py-3 bg-[#ff9a76] text-white text-center rounded-2xl font-bold shadow-md">打開我的集點卡</a>
            </div>

            <div class="bg-white p-5 rounded-3xl shadow-sm border border-orange-50">
                <h3 class="text-orange-400 font-bold flex items-center gap-2 mb-4">📅 營業與預約狀態</h3>
                <div class="flex justify-between items-center mb-4">
                    <button onclick="changeMonth(-1)" class="w-8 h-8 bg-orange-50 text-orange-400 rounded-full">◀</button>
                    <div id="month-label" class="font-bold text-gray-700">讀取中...</div>
                    <button onclick="changeMonth(1)" class="w-8 h-8 bg-orange-50 text-orange-400 rounded-full">▶</button>
                </div>
                <div id="calendar-grid" class="calendar-grid mb-4"></div>
                <div id="slot-details" class="hidden p-4 bg-orange-50 rounded-2xl">
                    <p id="selected-date-info" class="text-sm font-bold mb-2 text-gray-700"></p>
                    <div id="slots-container" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>

        <section id="view-order" class="view-section">
            <div class="grid grid-cols-3 gap-2 mb-6">
                <label class="option-card cursor-pointer text-center">
                    <input type="radio" name="orderType" value="內用(外桌)" class="hidden" checked>
                    <div class="border border-gray-200 bg-white rounded-2xl py-3 transition-all">
                        <div class="text-lg">🌳</div><div class="text-xs font-bold">外桌</div>
                    </div>
                </label>
                <label class="option-card cursor-pointer text-center">
                    <input type="radio" name="orderType" value="內用(內桌)" class="hidden">
                    <div class="border border-gray-200 bg-white rounded-2xl py-3 transition-all">
                        <div class="text-lg">🛋️</div><div class="text-xs font-bold">內桌</div>
                    </div>
                </label>
                <label class="option-card cursor-pointer text-center">
                    <input type="radio" name="orderType" value="外帶" class="hidden">
                    <div class="border border-gray-200 bg-white rounded-2xl py-3 transition-all">
                        <div class="text-lg">🛍️</div><div class="text-xs font-bold">外帶</div>
                    </div>
                </label>
            </div>

            <div id="menu-container" class="grid gap-4"></div>

            <div class="mt-6 bg-white p-5 rounded-3xl shadow-sm space-y-4">
                <div>
                    <h3 class="font-bold text-gray-700 mb-2 text-sm">📝 訂單備註</h3>
                    <textarea id="customerNote" rows="2" placeholder="甜度冰塊調整..." class="w-full p-3 bg-gray-50 border border-gray-100 rounded-xl text-sm"></textarea>
                </div>
                <div>
                    <h3 class="font-bold text-gray-700 mb-2 text-sm">💳 付款方式(餐後結帳)</h3>
                    <div class="grid grid-cols-2 gap-3">
                        <label class="option-card cursor-pointer">
                            <input type="radio" name="payment" value="現金" class="hidden" checked onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-xl p-3 text-center text-xs font-bold text-gray-500">💵 現金</div>
                        </label>
                        <label class="option-card cursor-pointer">
                            <input type="radio" name="payment" value="LINE Pay" class="hidden" onchange="updatePaymentHint()">
                            <div class="border border-gray-200 rounded-xl p-3 text-center text-xs font-bold text-gray-500">💳 LINE Pay</div>
                        </label>
                    </div>
                    <p id="payment-hint" class="hidden text-[10px] text-red-500 mt-2 p-2 bg-red-50 rounded-lg border border-red-100">⚠️ LINE Pay 請至櫃檯掃碼</p>
                </div>
            </div>
        </section>
    </main>

    <div id="order-bar" class="fixed bottom-[85px] left-0 w-full bg-white border-t p-4 shadow-lg z-30 hidden">
        <div class="flex justify-between items-center max-w-500 mx-auto">
            <div class="text-xs text-gray-500">已選 <span id="total-count" class="font-bold text-orange-500">0</span> 份</div>
            <button onclick="submitOrder()" id="submit-btn" class="bg-stone-700 text-white px-8 py-2 rounded-xl font-bold text-sm disabled:bg-gray-300" disabled>送出訂單 ($0)</button>
        </div>
    </div>

    <nav class="footer-nav">
        <button onclick="switchView('home')" id="nav-home" class="nav-item active">
            <span class="nav-icon">🏠</span>行事曆
        </button>
        <button onclick="switchView('order')" id="nav-order" class="nav-item">
            <span class="nav-icon">☕</span>點餐系統
        </button>
    </nav>

    <script>
        const YOUR_LIFF_ID = "2008538785-jQ0Wm6px";
        const API_URL = "https://script.google.com/macros/s/AKfycbylNOUexoQZKY3EH4iWAft82GjH0aPMBOEUzmmHe5GpSbJPhdSZU4KbyFFiPRU70Ri8/exec";
        
        const menuItems = [
            { id: 'c1', name: '美式咖啡', price: 80, type: 2, desc: '經典黑咖啡', img: 'https://placehold.co/100x100/3e2723/fff?text=Americano' },
            { id: 'c2', name: '拿鐵咖啡', price: 120, type: 2, desc: '濃縮咖啡與無乳糖牛奶', img: 'https://placehold.co/100x100/5d4037/fff?text=Latte' },
            { id: 'c3', name: '摩卡咖啡', price: 130, type: 2, desc: '巧克力風味拿鐵', img: 'https://placehold.co/100x100/4e342e/fff?text=Mocha' },
            { id: 't1', name: '可可牛奶', price: 70, type: 2, desc: '香濃巧克力與無乳糖牛奶', img: 'https://placehold.co/100x100/b71c1c/fff?text=Cocoa' },
            { id: 't2', name: '紅茶拿鐵', price: 90, type: 2, desc: '精選紅茶與無乳糖牛奶', img: 'https://placehold.co/100x100/a1887f/fff?text=TeaLatte' },
            { id: 'd1', name: '綠茶拿鐵(new)', price: 90, type: 2, desc: '精選綠茶與無乳糖牛奶', img: 'https://placehold.co/100x100/3e2723/fff?text=GreenTeaLatte' },
            { id: 'h1', name: '高山冬片茶', price: 100, type: 1, desc: '現泡熱茶', img: 'https://placehold.co/100x100/689f38/fff?text=Tea' },
            { id: 'h2', name: '草莓風味果茶', price: 120, type: 1, desc: '酸甜莓果香氣', img: 'https://placehold.co/100x100/e91e63/fff?text=StrawberryTea' },
            { id: 'h3', name: '麝香葡萄風味茶', price: 150, type: 1, desc: '濃郁葡萄果香', img: 'https://placehold.co/100x100/8e24aa/fff?text=GrapeTea' },
            { id: 'ice1', name: '可爾必思', price: 60, type: 0, desc: '乳酸氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Calpis' },
            { id: 'ice2', name: '春梅(new)', price: 100, type: 0, desc: '青梅醋氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Plum' },
            { id: 'ice3', name: '夏戀', price: 100, type: 0, desc: '石榴醋氣泡飲', img: 'https://placehold.co/100x100/039be5/fff?text=Pomegranate' },
            { id: 'ice4', name: '阿尼亞', price: 150, type: 0, desc: '咖啡基底乳酸氣泡特調', img: 'https://placehold.co/100x100/ff6f00/fff?text=Anya' },
            { id: 'f1', name: '原味鬆餅', price: 50, type: null, desc: ' ', img: 'https://placehold.co/100x100/ffb74d/fff?text=Waffle' },
            { id: 'f2', name: '榛果巧克力鬆餅', price: 70, type: null, desc: '榛果巧克力醬', img: 'https://placehold.co/100x100/5d4037/fff?text=ChocoWaffle' },
            { id: 'f3', name: '草莓果醬鬆餅', price: 70, type: null, desc: '草莓果醬', img: 'https://placehold.co/100x100/e91e63/fff?text=StrawberryWaffle' },
            { id: 'f4', name: 'Ｑ心麻糬鬆餅', price: 100, type: null, desc: '內餡Q彈麻糬', img: 'https://placehold.co/100x100/fff9c4/333?text=MochiWaffle' },
            { id: 'f5', name: '嘉年華鬆餅', price: 120, type: null, desc: '三種味道一次滿足', img: 'https://placehold.co/100x100/f48fb1/fff?text=Carnival' },
            { id: 's1', name: '香絲(小)', price: 30, type: null, desc: '烘烤鱈魚香絲', img: 'https://placehold.co/100x100/ffecb3/333?text=Codfish' },
            { id: 's2', name: '香絲(大)', price: 60, type: null, desc: '烘烤鱈魚香絲', img: 'https://placehold.co/100x100/ffecb3/333?text=Codfish' },
            { id: 's3', name: '香魚片', price: 60, type: null, desc: '涮嘴小零食', img: 'https://placehold.co/100x100/ffecb3/333?text=Fish' },
            { id: 's4', name: '多肉布丁', price: 70, type: null, desc: '手工焦糖布丁', img: 'https://placehold.co/100x100/ef5350/fff?text=Pudding' }
        ];

        let cart = {};
        let currentDisplayDate = new Date();
        let globalData = [];

        // 初始化
        async function init() {
            try {
                await liff.init({ liffId: YOUR_LIFF_ID });
                if (liff.isInClient() && !liff.isLoggedIn()) liff.login();
                
                renderMenu();
                const response = await fetch(API_URL);
                globalData = await response.json();
                renderCalendar();
                updateShopStatus(globalData);
            } catch (err) {
                console.error("Init Failed", err);
                renderMenu();
                renderCalendar();
            }
        }

        // 頁面切換
        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`nav-${view}`).classList.add('active');
            document.getElementById('order-bar').classList.toggle('hidden', view !== 'order');
        }

        // 點餐核心功能
        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menuItems.map(item => {
                let controls = '';
                if (item.type === 2) { // 冰熱都有
                    controls = `
                        <div class="flex items-center justify-between mt-1"><span class="text-[10px] text-red-500 font-bold">🔥 熱</span>
                        <div class="flex items-center"><div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'hot', -1)">-</div>
                        <span class="mx-2 text-sm font-bold" id="qty-${item.id}-hot">0</span>
                        <div class="qty-btn plus-btn hot-theme" onclick="updateCart('${item.id}', 'hot', 1)">+</div></div></div>
                        <div class="flex items-center justify-between mt-1"><span class="text-[10px] text-blue-500 font-bold">❄️ 冰</span>
                        <div class="flex items-center"><div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'cold', -1)">-</div>
                        <span class="mx-2 text-sm font-bold" id="qty-${item.id}-cold">0</span>
                        <div class="qty-btn plus-btn cold-theme" onclick="updateCart('${item.id}', 'cold', 1)">+</div></div></div>`;
                } else {
                    const variant = item.type === 1 ? 'hot' : (item.type === 0 ? 'cold' : 'default');
                    const theme = item.type === 1 ? 'hot-theme' : (item.type === 0 ? 'cold-theme' : 'default-theme');
                    controls = `<div class="flex items-center justify-end">
                        <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', '${variant}', -1)">-</div>
                        <span class="mx-2 text-sm font-bold" id="qty-${item.id}-${variant}">0</span>
                        <div class="qty-btn plus-btn ${theme}" onclick="updateCart('${item.id}', '${variant}', 1)">+</div></div>`;
                }
                return `<div class="bg-white p-3 rounded-2xl flex shadow-sm border border-gray-50">
                    <img src="${item.img}" class="w-16 h-16 rounded-xl object-cover mr-3">
                    <div class="flex-1 flex flex-col justify-between">
                        <div class="flex justify-between items-center"><h3 class="font-bold text-sm text-gray-800">${item.name}</h3><span class="text-sm font-bold">$${item.price}</span></div>
                        ${controls}
                    </div></div>`;
            }).join('');
        }

        function updateCart(id, variant, change) {
            const key = `${id}-${variant}`;
            cart[key] = (cart[key] || 0) + change;
            if (cart[key] < 0) cart[key] = 0;
            document.getElementById(`qty-${key}`).innerText = cart[key];
            calculateTotal();
        }

        function calculateTotal() {
            let totalQty = 0, totalP = 0;
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = menuItems.find(i => i.id === key.split('-')[0]);
                    totalQty += qty; totalP += (item.price * qty);
                }
            }
            document.getElementById('total-count').innerText = totalQty;
            const sBtn = document.getElementById('submit-btn');
            sBtn.disabled = totalQty === 0;
            sBtn.innerText = totalQty === 0 ? "請先選購" : `送出訂單 ($${totalP})`;
        }

        // 日曆核心功能
        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            renderCalendar();
            document.getElementById('slot-details').classList.add('hidden');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            document.getElementById('month-label').innerText = `${year}年 ${month + 1}月`;
            
            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            grid.innerHTML = ['一', '二', '三', '四', '五', '六', '日'].map(d => `<div class="text-[10px] font-bold text-gray-400 py-2">${d}</div>`).join('');
            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const scheduleMap = {};
            globalData.forEach(item => {
                const d = new Date(item.Date);
                if (!isNaN(d)) scheduleMap[`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`] = item;
            });

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayData = scheduleMap[dateKey];
                const dayOfWeek = new Date(year, month, d).getDay();
                let className = "cal-day", onClick = `showSlots('${d}', '', [])`;

                // 修正 2：確保預約日期（藍色日期）能正確接收 Slots 陣列並觸發點擊
                if (dayData) {
                    const type = String(dayData.Type || ""), hours = String(dayData.Hours || ""), slotsStr = String(dayData.Slots || "");
                    if (type.includes("休") || hours.includes("休")) { 
                        className += " status-off"; 
                        onClick = `showSlots('${d}', '店休', [])`; 
                    }
                    else if (slotsStr && slotsStr.trim() !== "") { 
                        className += " status-booked"; 
                        // 將字串轉為陣列再序列化傳入
                        const slotsArr = slotsStr.split(',').map(s => s.trim());
                        onClick = `showSlots('${d}', '${hours}', ${JSON.stringify(slotsArr)})`; 
                    }
                    else { 
                        onClick = `showSlots('${d}', '${hours}', [])`; 
                    }
                } else if (dayOfWeek === 1) { 
                    className += " status-off"; 
                    onClick = `showSlots('${d}', '店休', [])`; 
                }

                grid.innerHTML += `<div class="${className}" onclick="${onClick}">${d}</div>`;
            }
        }

        function showSlots(day, hours, slots) {
            const box = document.getElementById('slot-details');
            const info = document.getElementById('selected-date-info');
            const container = document.getElementById('slots-container');
            container.innerHTML = '';
            box.classList.remove('hidden');

            if (hours === '店休') {
                info.innerText = `📅 ${day}日 店長肯多休息中 💤`;
                container.innerHTML = `<p class="text-xs text-gray-400">今日不營業喔！</p>`;
            } else {
                info.innerText = `📅 ${day}日 營業時間: ${hours || '14:00-19:00'}`;
                // 修正：檢查 slots 是否為有效陣列且有長度
                if (Array.isArray(slots) && slots.length > 0) {
                    slots.forEach(s => container.innerHTML += `<span class="bg-white text-blue-500 text-[10px] px-2 py-1 rounded-lg border border-blue-100 font-bold">${s}</span>`);
                } else {
                    container.innerHTML = `<p class="text-xs text-gray-400">目前無預約，歡迎詢問。</p>`;
                }
            }
        }

        function updateShopStatus(data) {
            const now = new Date();
            const dateKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
            const today = data.find(item => { const d = new Date(item.Date); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` === dateKey; });
            const badge = document.getElementById('shop-status-badge');
            const greet = document.getElementById('greeting-text');

            if (today && (String(today.Type).includes("休") || String(today.Hours).includes("休"))) {
                badge.innerText = "今日店休中 😴"; badge.classList.replace('bg-stone-700', 'bg-red-900/30'); greet.innerText = "肯多店長休息中";
            } else {
                badge.innerText = "今日正常營業 ✨"; badge.classList.replace('bg-stone-700', 'bg-green-900/30');
            }
        }

        function updatePaymentHint() {
            const p = document.querySelector('input[name="payment"]:checked').value;
            document.getElementById('payment-hint').classList.toggle('hidden', p !== 'LINE Pay');
        }

        function submitOrder() {
            const type = document.querySelector('input[name="orderType"]:checked').value;
            const note = document.getElementById('customerNote').value.trim();
            const pay = document.querySelector('input[name="payment"]:checked').value;
            let details = "", total = 0;

            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const [id, variant] = key.split('-');
                    const item = menuItems.find(i => i.id === id);
                    const sub = item.price * qty; total += sub;
                    details += `▫️ ${item.name} ${variant==='hot'?'🔥':(variant==='cold'?'❄️':'')} x${qty} ($${sub})\n`;
                }
            }
            const msg = `【${type}】${pay}\n📝 備註：${note||'無'}\n------------------\n${details}------------------\n💰 總計：$${total}`;
            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: msg }]).then(() => liff.closeWindow()).catch(e => alert(e));
            } else {
                alert("預覽訂單：\n" + msg);
            }
        }

        init();
    </script>
</body>
</html>
