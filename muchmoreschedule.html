<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>多肉咖啡 | Muchmore Cafe</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #fff0f0;
            --pastel-orange: #ffecd2;
            --pastel-cream: #fdfcf0;
            --accent-orange: #ff9a76;
            --text-gray: #4a4a4a; /* 加深文字顏色提高對比 */
            --booked-blue: #e3f2fd;
            --booked-text: #1565c0;
        }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: var(--pastel-cream); height: 100vh; overflow: hidden; color: var(--text-gray); }
        
        /* 布局高度微調 */
        main { height: calc(100vh - 140px); overflow-y: auto; padding-bottom: 280px; }
        
        .view-section { display: none; animation: fadeIn 0.3s ease; }
        .view-section.active { display: block; }

        /* 點餐按鈕加大 */
        .qty-btn { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: bold; cursor: pointer; }
        .minus-btn { background-color: #f1f3f5; color: #495057; }
        .hot-theme { background-color: #E53935; color: white; } 
        .cold-theme { background-color: #1E88E5; color: white; } 
        .default-theme { background-color: #FB8C00; color: white; } 

        /* 固定底部區塊 */
        .fixed-bottom-controls { position: fixed; bottom: 180px; left: 0; width: 100%; background: white; padding: 16px; border-top: 2px solid #f8f8f8; z-index: 40; box-shadow: 0 -10px 20px rgba(0,0,0,0.05); }

        /* 日曆字體加大 */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .cal-day { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 500; border-radius: 14px; background: white; border: 1px solid #f0f0f0; }
        .status-off { background-color: #ffebeb !important; color: #ff6b6b !important; }
        .status-booked { background-color: var(--booked-blue) !important; color: var(--booked-text) !important; font-weight: bold; }
        
        /* 導航列文字 */
        .footer-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 92%; max-width: 450px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 14px 0; border-radius: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; border: 1px solid rgba(0,0,0,0.05); }
        .nav-item { border:none; background:none; color: #888; font-size: 14px; text-align: center; }
        .nav-item.active { color: var(--accent-orange); font-weight: bold; }
        .nav-icon { display: block; font-size: 20px; margin-bottom: 2px; }

        /* 輸入框與選單字體 */
        input[type="text"], input[type="radio"] + div { font-size: 15px !important; }
    </style>
</head>
<body>

    <header class="bg-stone-800 text-white p-5 rounded-b-[40px] shadow-lg text-center h-[140px] flex flex-col justify-center items-center">
        <img src="https://muchmore828.github.io/EightWords/logo.png" class="w-14 h-14 rounded-full border-2 border-white object-cover mb-2 shadow-md">
        <h1 id="greeting-text" class="text-base font-bold tracking-wide">您好，想喝點什麼？</h1>
        <div id="shop-status-badge" class="mt-2 inline-block px-4 py-1 rounded-full bg-stone-700 text-xs border border-stone-600">
            同步狀態中...
        </div>
    </header>

    <main class="container mx-auto px-5 mt-6">
        <section id="view-home" class="view-section active space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-50">
                <h3 class="text-orange-400 text-lg font-bold flex items-center gap-2 mb-2">🐾 胖多多集點卡</h3>
                <p class="text-sm text-gray-500 mb-5">消費100元即可累積1點，集滿享優惠！</p>
                <a href="https://u.lin.ee/sFWqYyn" class="block w-full py-4 bg-[#ff9a76] text-white text-center rounded-2xl font-bold text-lg shadow-md active:opacity-80">打開集點卡</a>
            </div>

            <div class="bg-white p-6 rounded-3xl shadow-sm border border-orange-50">
                <div class="flex justify-between items-center mb-5">
                    <button onclick="changeMonth(-1)" class="w-10 h-10 bg-orange-50 text-orange-400 rounded-full flex items-center justify-center text-xl">◀</button>
                    <div id="month-label" class="text-lg font-black text-gray-700">2026年 4月</div>
                    <button onclick="changeMonth(1)" class="w-10 h-10 bg-orange-50 text-orange-400 rounded-full flex items-center justify-center text-xl">▶</button>
                </div>
                <div id="calendar-grid" class="calendar-grid mb-6"></div>
                <div id="slot-details" class="hidden p-5 bg-orange-50 rounded-2xl border border-orange-100">
                    <p id="selected-date-info" class="text-base font-bold mb-3 text-gray-700"></p>
                    <div id="slots-container" class="flex flex-wrap gap-2"></div>
                </div>
            </div>
        </section>

        <section id="view-order" class="view-section">
            <div class="grid grid-cols-3 gap-3 mb-6">
                <label class="option-card cursor-pointer">
                    <input type="radio" name="orderType" value="內用(外桌)" class="hidden" checked>
                    <div class="border-2 border-gray-100 bg-white rounded-2xl py-3 text-center transition-all">
                        <div class="text-xl mb-1"></div><div class="text-sm font-bold">外桌</div>
                    </div>
                </label>
                <label class="option-card cursor-pointer">
                    <input type="radio" name="orderType" value="內用(內桌)" class="hidden">
                    <div class="border-2 border-gray-100 bg-white rounded-2xl py-3 text-center transition-all">
                        <div class="text-xl mb-1"></div><div class="text-sm font-bold">內桌</div>
                    </div>
                </label>
                <label class="option-card cursor-pointer">
                    <input type="radio" name="orderType" value="外帶" class="hidden">
                    <div class="border-2 border-gray-100 bg-white rounded-2xl py-3 text-center transition-all">
                        <div class="text-xl mb-1"></div><div class="text-sm font-bold">外帶</div>
                    </div>
                </label>
            </div>
            <div id="menu-container" class="grid gap-4"></div>
        </section>
    </main>

    <div id="fixed-order-controls" class="fixed-bottom-controls hidden">
        <div class="space-y-3">
            <input type="text" id="customerNote" placeholder="📝 想要甜一點？冰多一點？請備註..." class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-2xl text-base focus:border-orange-300 outline-none">
            
            <div class="flex gap-3">
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="payment" value="現金" class="hidden" checked onchange="updatePaymentHint()">
                    <div class="border-2 border-gray-100 rounded-2xl py-3 text-center text-sm font-bold bg-white">💵 現金支付</div>
                </label>
                <label class="flex-1 cursor-pointer">
                    <input type="radio" name="payment" value="LINE Pay" class="hidden" onchange="updatePaymentHint()">
                    <div class="border-2 border-gray-100 rounded-2xl py-3 text-center text-sm font-bold bg-white">💳 LINE Pay</div>
                </label>
            </div>
        </div>
        <p id="payment-hint" class="hidden text-xs text-red-500 bg-red-50 mt-2 p-2 rounded-xl text-center font-medium">💡 LINE Pay 請於送出訂單後至櫃檯掃碼</p>
    </div>

    <div id="order-bar" class="fixed bottom-[85px] left-0 w-full bg-white border-t p-5 shadow-2xl z-50 hidden">
        <div class="flex justify-between items-center max-w-500 mx-auto">
            <div class="text-sm text-gray-500 font-medium">已選 <span id="total-count" class="text-xl font-black text-orange-500">0</span> 份</div>
            <button onclick="submitOrder()" id="submit-btn" class="bg-stone-800 text-white px-10 py-3 rounded-2xl font-bold text-base shadow-lg active:scale-95 transition-transform disabled:bg-gray-300" disabled>請先選購餐點</button>
        </div>
    </div>

    <nav class="footer-nav">
        <button onclick="switchView('home')" id="nav-home" class="nav-item active">
            <span class="nav-icon">🏠</span>行事曆
        </button>
        <button onclick="switchView('order')" id="nav-order" class="nav-item">
            <span class="nav-icon">☕</span>我要點餐
        </button>
    </nav>

    <script>
        // 腳本部分保持與上次逻辑一致，但 UI 渲染部分的 HTML 字級已對應加大
        const YOUR_LIFF_ID = "2008538785-jQ0Wm6px";
        const API_URL = "https://script.google.com/macros/s/AKfycbylNOUexoQZKY3EH4iWAft82GjH0aPMBOEUzmmHe5GpSbJPhdSZU4KbyFFiPRU70Ri8/exec";
        
        const menuItems = [
            { id: 'c1', name: '美式咖啡', price: 80, type: 2, desc: '經典黑咖啡', img: 'https://placehold.co/120x120/3e2723/fff?text=Americano' },
            { id: 'c2', name: '拿鐵咖啡', price: 120, type: 2, desc: '濃縮咖啡與無乳糖牛奶', img: 'https://placehold.co/120x120/5d4037/fff?text=Latte' },
            { id: 'c3', name: '摩卡咖啡', price: 130, type: 2, desc: '巧克力風味拿鐵', img: 'https://placehold.co/120x120/4e342e/fff?text=Mocha' },
            { id: 't1', name: '可可牛奶', price: 70, type: 2, desc: '香濃巧克力與無乳糖牛奶', img: 'https://placehold.co/120x120/b71c1c/fff?text=Cocoa' },
            { id: 't2', name: '紅茶拿鐵', price: 90, type: 2, desc: '精選紅茶與無乳糖牛奶', img: 'https://placehold.co/120x120/a1887f/fff?text=TeaLatte' },
            { id: 'd1', name: '綠茶拿鐵', price: 90, type: 2, desc: '精選綠茶與無乳糖牛奶', img: 'https://placehold.co/120x120/3e2723/fff?text=GreenTeaLatte' },
            { id: 'h1', name: '高山冬片茶', price: 100, type: 1, desc: '現泡熱茶', img: 'https://placehold.co/120x120/689f38/fff?text=Tea' },
            { id: 'h2', name: '草莓風味果茶', price: 120, type: 1, desc: '酸甜莓果香氣', img: 'https://placehold.co/120x120/e91e63/fff?text=StrawberryTea' },
            { id: 'h3', name: '麝香葡萄風味茶', price: 150, type: 1, desc: '濃郁葡萄果香', img: 'https://placehold.co/120x120/8e24aa/fff?text=GrapeTea' },
            { id: 'ice1', name: '可爾必思', price: 60, type: 0, desc: '乳酸氣泡飲', img: 'https://placehold.co/120x120/039be5/fff?text=Calpis' },
            { id: 'ice2', name: '春梅', price: 100, type: 0, desc: '青梅醋氣泡飲', img: 'https://placehold.co/120x120/039be5/fff?text=Plum' },
            { id: 'ice3', name: '夏戀', price: 100, type: 0, desc: '石榴醋氣泡飲', img: 'https://placehold.co/120x120/039be5/fff?text=Pomegranate' },
            { id: 'ice4', name: '阿尼亞', price: 150, type: 0, desc: '咖啡基底特調', img: 'https://placehold.co/120x120/ff6f00/fff?text=Anya' },
            { id: 'f1', name: '原味鬆餅', price: 50, type: null, desc: ' ', img: 'https://placehold.co/120x120/ffb74d/fff?text=Waffle' },
            { id: 'f2', name: '榛果巧克力鬆餅', price: 70, type: null, desc: ' ', img: 'https://placehold.co/120x120/5d4037/fff?text=Choco' },
            { id: 'f4', name: 'Ｑ心麻糬鬆餅', price: 100, type: null, desc: ' ', img: 'https://placehold.co/120x120/fff9c4/333?text=Mochi' },
            { id: 's4', name: '多肉布丁', price: 70, type: null, desc: '手工焦糖', img: 'https://placehold.co/120x120/ef5350/fff?text=Pudding' }
        ];

        let cart = {};
        let currentDisplayDate = new Date();
        let globalData = [];

        async function init() {
            try {
                await liff.init({ liffId: YOUR_LIFF_ID });
                if (liff.isInClient() && !liff.isLoggedIn()) liff.login();
                renderMenu();
                const response = await fetch(API_URL);
                globalData = await response.json();
                renderCalendar();
                updateShopStatus(globalData);
            } catch (err) {
                renderMenu(); renderCalendar();
            }
        }

        function switchView(view) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`view-${view}`).classList.add('active');
            document.getElementById(`nav-${view}`).classList.add('active');
            document.getElementById('order-bar').classList.toggle('hidden', view !== 'order');
            document.getElementById('fixed-order-controls').classList.toggle('hidden', view !== 'order');
        }

        function renderMenu() {
            const container = document.getElementById('menu-container');
            container.innerHTML = menuItems.map(item => {
                let controls = '';
                if (item.type === 2) {
                    controls = `
                        <div class="flex items-center justify-between mt-2"><span class="text-xs text-red-500 font-bold">🔥 熱飲</span>
                        <div class="flex items-center"><div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'hot', -1)">-</div>
                        <span class="mx-4 text-base font-bold" id="qty-${item.id}-hot">0</span>
                        <div class="qty-btn plus-btn hot-theme" onclick="updateCart('${item.id}', 'hot', 1)">+</div></div></div>
                        <div class="flex items-center justify-between mt-3"><span class="text-xs text-blue-500 font-bold">❄️ 冰飲</span>
                        <div class="flex items-center"><div class="qty-btn minus-btn" onclick="updateCart('${item.id}', 'cold', -1)">-</div>
                        <span class="mx-4 text-base font-bold" id="qty-${item.id}-cold">0</span>
                        <div class="qty-btn plus-btn cold-theme" onclick="updateCart('${item.id}', 'cold', 1)">+</div></div></div>`;
                } else {
                    const variant = item.type === 1 ? 'hot' : (item.type === 0 ? 'cold' : 'default');
                    const theme = item.type === 1 ? 'hot-theme' : (item.type === 0 ? 'cold-theme' : 'default-theme');
                    controls = `<div class="flex items-center justify-end mt-2">
                        <div class="qty-btn minus-btn" onclick="updateCart('${item.id}', '${variant}', -1)">-</div>
                        <span class="mx-4 text-base font-bold" id="qty-${item.id}-${variant}">0</span>
                        <div class="qty-btn plus-btn ${theme}" onclick="updateCart('${item.id}', '${variant}', 1)">+</div></div>`;
                }
                return `<div class="bg-white p-4 rounded-3xl flex shadow-sm border border-gray-100 items-center">
                    <img src="${item.img}" class="w-20 h-20 rounded-2xl object-cover mr-4 shadow-sm">
                    <div class="flex-1">
                        <div class="flex justify-between items-start"><h3 class="font-bold text-base text-gray-800">${item.name}</h3><span class="text-base font-black text-orange-500">$${item.price}</span></div>
                        ${controls}
                    </div></div>`;
            }).join('');
        }

        function updateCart(id, variant, change) {
            const key = `${id}-${variant}`;
            cart[key] = (cart[key] || 0) + change;
            if (cart[key] < 0) cart[key] = 0;
            document.getElementById(`qty-${key}`).innerText = cart[key];
            calculateTotal();
        }

        function calculateTotal() {
            let totalQty = 0, totalP = 0;
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const item = menuItems.find(i => i.id === key.split('-')[0]);
                    totalQty += qty; totalP += (item.price * qty);
                }
            }
            document.getElementById('total-count').innerText = totalQty;
            const sBtn = document.getElementById('submit-btn');
            sBtn.disabled = totalQty === 0;
            sBtn.innerText = totalQty === 0 ? "請先選購餐點" : `送出訂單 ($${totalP})`;
        }

        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            renderCalendar();
            document.getElementById('slot-details').classList.add('hidden');
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth();
            document.getElementById('month-label').innerText = `${year}年 ${month + 1}月`;
            
            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            grid.innerHTML = ['一', '二', '三', '四', '五', '六', '日'].map(d => `<div class="text-xs font-bold text-gray-400 text-center py-2">${d}</div>`).join('');
            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const scheduleMap = {};
            globalData.forEach(item => {
                const d = new Date(item.Date);
                if (!isNaN(d)) scheduleMap[`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`] = item;
            });

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayData = scheduleMap[dateKey];
                const dayOfWeek = new Date(year, month, d).getDay();
                let className = "cal-day", onClick = `showSlots('${d}', '', [])`;

                if (dayData) {
                    const type = String(dayData.Type || ""), hours = String(dayData.Hours || ""), slotsStr = String(dayData.Slots || "");
                    if (type.includes("休") || hours.includes("休")) { className += " status-off"; onClick = `showSlots('${d}', '店休', [])`; }
                    else if (slotsStr && slotsStr.trim() !== "") { 
                        className += " status-booked"; 
                        const safeSlots = JSON.stringify(slotsStr.split(',').map(s => s.trim())).replace(/"/g, '&quot;');
                        onClick = `showSlots('${d}', '${hours}', '${safeSlots}')`; 
                    }
                    else { onClick = `showSlots('${d}', '${hours}', [])`; }
                } else if (dayOfWeek === 1) { className += " status-off"; onClick = `showSlots('${d}', '店休', [])`; }

                grid.innerHTML += `<div class="${className}" onclick="${onClick}">${d}</div>`;
            }
        }

        function showSlots(day, hours, slotsData) {
            const box = document.getElementById('slot-details');
            const info = document.getElementById('selected-date-info');
            const container = document.getElementById('slots-container');
            container.innerHTML = '';
            box.classList.remove('hidden');

            let slots = [];
            try { 
                if (typeof slotsData === 'string' && slotsData !== '') slots = JSON.parse(slotsData.replace(/&quot;/g, '"'));
            } catch(e) {}

            if (hours === '店休') {
                info.innerText = `📅 ${day}日 店長休息`;
                container.innerHTML = `<p class="text-sm text-gray-400">今日不營業喔！</p>`;
            } else {
                info.innerText = `📅 ${day}日 營業: ${hours || '14:00-19:00'}`;
                if (slots.length > 0) {
                    slots.forEach(s => container.innerHTML += `<span class="bg-white text-blue-600 text-xs px-3 py-1.5 rounded-xl border border-blue-100 font-bold shadow-sm">${s}</span>`);
                } else {
                    container.innerHTML = `<p class="text-sm text-gray-400">今日無安排預約。</p>`;
                }
            }
        }

        function updateShopStatus(data) {
            const now = new Date();
            const dateKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
            const today = data.find(item => { const d = new Date(item.Date); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` === dateKey; });
            const badge = document.getElementById('shop-status-badge');
            if (today && (String(today.Type).includes("休") || String(today.Hours).includes("休"))) {
                badge.innerText = "今日店休中 😴"; badge.className = "mt-2 inline-block px-4 py-1 rounded-full bg-red-900/30 text-xs border border-red-800";
            } else {
                badge.innerText = "今日正常營業 ✨"; badge.className = "mt-2 inline-block px-4 py-1 rounded-full bg-green-900/30 text-xs border border-green-800";
            }
        }

        function updatePaymentHint() {
            const p = document.querySelector('input[name="payment"]:checked').value;
            document.getElementById('payment-hint').classList.toggle('hidden', p !== 'LINE Pay');
        }

        function submitOrder() {
            const type = document.querySelector('input[name="orderType"]:checked').value;
            const note = document.getElementById('customerNote').value.trim();
            const pay = document.querySelector('input[name="payment"]:checked').value;
            let details = "", total = 0;
            for (const [key, qty] of Object.entries(cart)) {
                if (qty > 0) {
                    const [id, variant] = key.split('-');
                    const item = menuItems.find(i => i.id === id);
                    const sub = item.price * qty; total += sub;
                    details += `▫️ ${item.name} ${variant==='hot'?'🔥':(variant==='cold'?'❄️':'')} x${qty} ($${sub})\n`;
                }
            }
            const msg = `【${type}】${pay}\n📝 備註：${note||'無'}\n------------------\n${details}------------------\n💰 總計：$${total}`;
            if (liff.isInClient()) {
                liff.sendMessages([{ type: 'text', text: msg }]).then(() => liff.closeWindow()).catch(e => alert("請檢查LIFF權限設定"));
            } else { alert("預覽訂單：\n" + msg); }
        }

        init();
    </script>
</body>
</html>
