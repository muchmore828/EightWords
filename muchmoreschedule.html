<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡 Muchmore Cafe | 數位導覽頁</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pastel-pink: #fff0f0;
            --pastel-orange: #ffecd2;
            --pastel-cream: #fdfcf0;
            --accent-orange: #ff9a76;
            --text-gray: #6d6d6d;
            --booked-blue: #e3f2fd; /* 已預約背景色 */
            --booked-text: #2196f3; /* 已預約文字色 */
            --off-red: #ffebeb; /* 店休背景色 */
            --off-text: #ff6b6b; /* 店休文字色 */
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--pastel-cream);
            color: var(--text-gray);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hero-section {
            width: 100%;
            background: linear-gradient(180deg, var(--pastel-orange), var(--pastel-pink));
            padding: 30px 20px;
            text-align: center;
            border-bottom-left-radius: 40px;
            border-bottom-right-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .cat-mascot {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            margin: 0 auto 15px;
            border: 4px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            display: block;
            object-fit: cover;
            object-position: center;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            background: white;
            font-weight: bold;
            color: var(--accent-orange);
            margin-top: 10px;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto 100px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.02);
            border: 1px solid rgba(255, 154, 118, 0.1);
        }

        h3 {
            color: var(--accent-orange);
            margin: 0 0 15px 0;
            font-size: 1.2em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .calendar-ctrl {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .btn-month {
            border: none;
            background: var(--pastel-orange);
            color: var(--accent-orange);
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .calendar-header {
            font-weight: bold;
            color: var(--text-gray);
            margin: 0;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
            text-align: center;
        }

        .cal-day {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 0.85em;
            border-radius: 12px;
            background: #fdfdfd;
            border: 1px solid #f0f0f0;
            transition: 0.2s;
            cursor: pointer;
        }

        .cal-label { font-weight: bold; border: none; background: transparent; cursor: default; }
        
        .status-off { 
            background-color: var(--off-red) !important; 
            color: var(--off-text) !important; 
            border: 1px solid #ffcdd2 !important; 
        }
        .status-booked { 
            background-color: var(--booked-blue) !important; 
            color: var(--booked-text) !important; 
            border: 1px solid #bbdefb !important; 
        }

        #slot-details {
            margin-top: 15px;
            padding: 15px;
            background: var(--pastel-orange);
            border-radius: 15px;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .slot-item {
            background: white;
            color: var(--booked-text);
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 0.9em;
            font-weight: bold;
            border: 1px solid var(--booked-blue);
            margin: 4px;
            display: inline-block;
        }

        .footer-nav {
            position: fixed;
            bottom: 20px;
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 100;
        }

        .nav-item { text-decoration: none; color: var(--text-gray); font-size: 0.8em; text-align: center; }
        .nav-icon { display: block; font-size: 1.5em; margin-bottom: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="hero-section">
        <img src="logo.png" class="cat-mascot" alt="店鋪頭像">
        <h2 id="greeting-text">下午好，想喝點什麼？</h2>
        <div id="shop-status" class="status-badge">同步店鋪狀態中...</div>
    </div>

    <div class="container">
        <div class="card">
            <h3>🐾胖多多集點卡</h3>
            <p style="font-size: 0.9em; margin-bottom: 15px;">實體卡數位化！<br>餐飲消費100元即可累積1點<br>每5點可獲得50元折抵券<br>集滿15點享一年餐飲九折優惠！</p>
            <a href="https://u.lin.ee/sFWqYyn" target="_blank" style="background:var(--accent-orange); color:white; text-decoration:none; display:block; text-align:center; padding:12px; border-radius:15px; font-weight:bold; cursor: pointer;">打開我的集點卡</a>
        </div>

        <div class="card">
            <h3>📅 營業與預約狀態</h3>
            <div class="calendar-ctrl">
                <button class="btn-month" onclick="changeMonth(-1)">◀</button>
                <div id="month-label" class="calendar-header">讀取中...</div>
                <button class="btn-month" onclick="changeMonth(1)">▶</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <div id="slot-details">
                <p id="selected-date-info" style="margin: 0 0 10px 0; font-weight: bold; font-size: 0.9em;"></p>
                <div id="slots-container" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
            </div>
            <p style="font-size: 0.75em; color: #aaa; margin-top: 15px; text-align: center;">💡 藍色代表當日部分時段已有預約</p>
        </div>
    </div>

    <nav class="footer-nav">
        <a href="javascript:void(0)" onclick="openLiff('2008538785-jQ0Wm6px" class="nav-item"><span class="nav-icon">☕</span>數位點餐</a>
        <a href="javascript:void(0)" onclick="openLiff('2008538785-7DvjVKw5" class="nav-item"><span class="nav-icon">🔮</span>預約諮詢</a>
    </nav>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbylNOUexoQZKY3EH4iWAft82GjH0aPMBOEUzmmHe5GpSbJPhdSZU4KbyFFiPRU70Ri8/exec";
        
        let currentDisplayDate = new Date();
        let globalData = [];

        async function init() {
            try {
                const response = await fetch(API_URL);
                globalData = await response.json();
                renderCalendar();
                updateHeroStatus(globalData);
            } catch (e) {
                document.getElementById('greeting-text').innerText = "連線失敗";
                console.error("初始化失敗:", e);
            }
        }
        function openLiff(liffId) {
            // 取得完整的 LIFF URL
            const liffUrl = "https://liff.line.me/" + liffId;

            if (liff.isInClient()) {
                // 關鍵：使用 LINE 內建指令開啟，這會強迫 LINE 重新執行授權與初始化
                liff.openWindow({
                    url: liffUrl,
                    external: false // false 代表在 LINE 裡面開啟新的 LIFF 視窗
                });
            } else {
                // 非 LINE 環境則直接跳轉
                window.location.href = liffUrl;
            }
        }
        
        function changeMonth(offset) {
            currentDisplayDate.setMonth(currentDisplayDate.getMonth() + offset);
            renderCalendar();
            document.getElementById('slot-details').style.display = 'none';
        }

        function renderCalendar() {
            const grid = document.getElementById('calendar-grid');
            const monthLabel = document.getElementById('month-label');
            const year = currentDisplayDate.getFullYear();
            const month = currentDisplayDate.getMonth(); 

            monthLabel.innerText = `${year}年 ${month + 1}月`;
            
            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1; // 週一為首的位移計算
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            grid.innerHTML = '';
            const weekDays = ['一', '二', '三', '四', '五', '六', '日'];
            weekDays.forEach(d => grid.innerHTML += `<div class="cal-day cal-label">${d}</div>`);

            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const scheduleMap = {};
            globalData.forEach(item => {
                const d = new Date(item.Date);
                if (!isNaN(d)) {
                    const k = `${d.getFullYear()}-${d.getMonth() + 1}-${d.getDate()}`;
                    scheduleMap[k] = item;
                }
            });

            for (let d = 1; d <= daysInMonth; d++) {
                const dateKey = `${year}-${month + 1}-${d}`;
                const dayData = scheduleMap[dateKey];
                const dayOfWeek = new Date(year, month, d).getDay(); 
                
                let className = "cal-day";
                let statusText = "";
                let onClickStr = `showSlots('${d}', '', [])`;

                if (dayData) {
                    const type = String(dayData.Type || "").trim();
                    const hours = String(dayData.Hours || "").trim();
                    const slots = String(dayData.Slots || "").trim();

                    if (type.includes("休") || hours.includes("休息")) {
                        className += " status-off";
                        onClickStr = `showSlots('${d}', '店休', [])`;
                    } else if (slots !== "") {
                        className += " status-booked";
                        statusText = "";
                        const slotsArray = slots.split(',');
                        const slotsJson = JSON.stringify(slotsArray).replace(/"/g, '&quot;');
                        onClickStr = `showSlots('${d}', '${hours}', ${slotsJson})`;
                    } else {
                        onClickStr = `showSlots('${d}', '${hours}', [])`;
                    }
                } else if (dayOfWeek === 1) { // 預設週一店休
                    className += " status-off";
                    onClickStr = `showSlots('${d}', '店休', [])`;
                }

                grid.innerHTML += `<div class="${className}" onclick="${onClickStr}">${d}${statusText}</div>`;
            }
        }

        function showSlots(day, hours, slots) {
            const box = document.getElementById('slot-details');
            const dateInfo = document.getElementById('selected-date-info');
            const container = document.getElementById('slots-container');
            container.innerHTML = '';

            if (hours === '店休') {
                dateInfo.innerText = `📅 ${day}日 店長肯多休息中 💤`;
                container.innerHTML = `<p style="font-size: 0.85em; color: #888;">今日公休，祝您有美好的一天！</p>`;
            } else if (slots.length > 0) {
                dateInfo.innerText = `📅 ${day}日 營業時間 ${hours || '正常營業'}，已預約時段 💙`;
                slots.forEach(s => {
                    if(s.trim()) {
                        container.innerHTML += `<span class="slot-item">${s.trim()}</span>`;
                    }
                });
            } else {
                dateInfo.innerText = `📅 ${day}日 營業時間 ${hours || '正常營業'}`;
                container.innerHTML = `<p style="font-size: 0.85em; color: #888;">今日尚無安排預約，歡迎私訊詢問！</p>`;
            }
            box.style.display = 'block';
        }

        function updateHeroStatus(data) {
            const now = new Date();
            const dateKey = `${now.getFullYear()}-${now.getMonth()+1}-${now.getDate()}`;
            const todayData = data.find(item => {
                const d = new Date(item.Date);
                return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}` === dateKey;
            });

            const badge = document.getElementById('shop-status');
            const greet = document.getElementById('greeting-text');

            if (todayData && (String(todayData.Type).includes("休") || String(todayData.Hours).includes("休"))) {
                badge.innerText = "今日店休中 😴";
                badge.style.color = "#ccc";
                greet.innerText = "肯多店長休息中";
            } else {
                badge.innerText = "今日正常營業 ✨";
                greet.innerText = "下午好，想喝點什麼？";
            }
        }

        init();
    </script>
</body>
</html>
