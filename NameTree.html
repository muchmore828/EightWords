<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>知識查詢系統</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; }
        .section { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .display-area { background-color: #f9f9f9; min-height: 100px; }
    </style>
</head>
<body>

<div class="container">
    <!-- 上方輸入區 -->
    <div class="section" id="input-section">
        <h2>資料輸入區</h2>
        <div class="input-grid">
            <label>父親姓氏: <input type="text" id="fatherName"></label>
            <label>母親姓氏: <input type="text" id="motherName"></label>
            <label>性別: 
                <select id="gender">
                    <option value="男">男</option>
                    <option value="女">女</option>
                </select>
            </label>
            <label>出生順序: <input type="text" id="birthOrder"></label>
            <label>家中排行: <input type="number" id="familyRank"></label>
            <label>出生民國年: <input type="number" id="birthYear"></label>
            <label>名: <input type="text" id="firstName"></label>
            <label>字: <input type="text" id="middleName"></label>
            <label>名的筆劃數: <input type="number" id="firstStrokes"></label>
            <label>字的筆劃數: <input type="number" id="middleStrokes"></label>
        </div>
        <button onclick="displayData()">查詢/顯示</button>
    </div>

    <!-- 下方顯示區 -->
    <div class="section display-area" id="display-section">
        <h2>資料顯示區</h2>
        <div id="output">尚未輸入資料...</div>
    </div>
</div>

<script>
    function displayData() {
        const fields = [
            {id: 'fatherName', label: '父親姓氏'}, {id: 'motherName', label: '母親姓氏'},
            {id: 'gender', label: '性別'}, {id: 'birthOrder', label: '出生順序'},
            {id: 'familyRank', label: '家中排行'}, {id: 'birthYear', label: '出生民國年'},
            {id: 'firstName', label: '名'}, {id: 'middleName', label: '字'},
            {id: 'firstStrokes', label: '名的筆劃數'}, {id: 'middleStrokes', label: '字的筆劃數'}
        ];
        
        let html = "<ul>";
        fields.forEach(f => {
            const val = document.getElementById(f.id).value;
            html += `<li><strong>${f.label}:</strong> ${val}</li>`;
        });
        html += "</ul>";
        document.getElementById('output').innerHTML = html;
    }
</script>

</body>
</html>
