<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>命理演算系統 - 手機優化版</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; font-size: 15px; color: #333; background: #f4f7f6; padding: 10px; margin: 0; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .input-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
        h2 { color: #2c3e50; font-size: 18px; border-bottom: 2px solid #2c3e50; padding-bottom: 5px; }
        label { font-size: 12px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 12px; background: #2c3e50; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        .result-area { margin-top: 15px; padding: 10px; background: #eef2f3; border-radius: 8px; border: 1px solid #dcdcdc; font-size: 14px; }
        .row-item { margin-bottom: 4px; }
        .highlight { color: #d35400; font-weight: bold; }
        .divider { border-bottom: 1px solid #ccc; margin: 8px 0; padding-bottom: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h2>參數輸入區</h2>
    <div class="input-row">
        <label>父姓: <input type="text" id="fatherName"></label>
        <label>母姓: <input type="text" id="motherName"></label>
        <label>性別: <select id="gender"><option value="男">男</option><option value="女">女</option></select></label>
    </div>
    <div class="input-row">
        <label>第幾胎: <input type="number" id="birthOrder"></label>
        <label>排行: <input type="number" id="familyRank"></label>
        <label>獨生: <select id="isOnlyChild"><option value="否">否</option><option value="是">是</option></select></label>
    </div>
    <div class="input-row">
        <label>民國年: <input type="number" id="birthYear"></label>
        <label>名劃: <input type="number" id="firstStrokes"></label>
        <label>字劃: <input type="number" id="middleStrokes"></label>
    </div>
    <div class="input-row">
        <label>名: <input type="text" id="firstName"></label>
        <label>字: <input type="text" id="middleName"></label>
        <label>&nbsp;</label>
    </div>
    <button onclick="calculate()">開始計算</button>

    <div class="result-area" id="output">結果顯示區...</div>
</div>

<script>
    let surnameDB = JSON.parse(localStorage.getItem('mySurnameDB')) || { "陳": 16, "林": 8, "黃": 12, "李": 7, "王": 4 };
    const lookupTable = {
        1: "14682", 2: "21357", 3: "34692", 4: "41583", 
        5: "54927", 6: "61438", 7: "72359", 8: "82164", 9: "91357"
    };
    const mapping = {1: '北北', 2: '雲嘉南', 3: '花蓮', 4: '台東', 5: '彰投', 6: '桃竹', 7: '中苗', 8: '宜基', 9: '高屏'};
    const stateMap = {
        "-8": "老", "-7": "病", "-6": "死", "-5": "劫", "-4": "安", "-3": "生", "-2": "老", "-1": "病",
        "0": "生", "1": "老", "2": "病", "3": "死", "4": "劫", "5": "安", "6": "生", "7": "老", "8": "病"
    };

    function saveDB() { localStorage.setItem('mySurnameDB', JSON.stringify(surnameDB)); }
    function sumToSingleDigit(n) {
        let val = Math.abs(n);
        while (val > 9) val = val.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        return val;
    }
    function getIntersection(strA, strB) {
        let setA = new Set(strA.split(''));
        let intersection = [...new Set(strB.split('').filter(x => setA.has(x)))].sort().join('');
        return intersection.length > 0 ? intersection : "0";
    }
    function getMissing(strArr) {
        let union = new Set();
        strArr.forEach(s => s.split('').forEach(char => union.add(char)));
        let missing = [];
        for (let i = 1; i <= 9; i++) { if (!union.has(i.toString())) missing.push(i); }
        return missing.length > 0 ? missing.join('') : "0";
    }

    function calculate() {
        const fName = document.getElementById('fatherName').value;
        const mName = document.getElementById('motherName').value;
        const gender = document.getElementById('gender').value;
        const birthOrder = parseInt(document.getElementById('birthOrder').value) || 0;
        const birthYear = parseInt(document.getElementById('birthYear').value) || 0;
        const rawFirst = parseInt(document.getElementById('firstStrokes').value) || 0;
        const rawMiddle = parseInt(document.getElementById('middleStrokes').value) || 0;

        const checkSurname = (name) => {
            if (name === "") return 0;
            if (surnameDB.hasOwnProperty(name) && confirm(`${name}姓氏筆畫為 ${surnameDB[name]}，是否正確？`)) return surnameDB[name];
            let strokes = parseInt(prompt(`請輸入 ${name} 的正確筆劃數：`));
            if (!isNaN(strokes)) { surnameDB[name] = strokes; saveDB(); }
            return strokes || 0;
        };

        const fStrokes = checkSurname(fName);
        const mStrokes = checkSurname(mName);

        const yearSum = sumToSingleDigit(birthYear);
        const map = {1: 7, 2: 6, 3: 5, 4: 4, 5: 3, 6: 2, 7: 1, 8: 9, 9: 8};
        let 卦 = (gender === "女") ? yearSum : (map[yearSum] || 0);
        
        const lifeNumber = fStrokes + mStrokes + 1 - birthOrder;
        const lifeRoot = sumToSingleDigit(lifeNumber);
        const fortuneRoot = sumToSingleDigit((lifeRoot * 10) + 卦);
        const vaultRoot = sumToSingleDigit((fortuneRoot * 10) + lifeRoot);

        const v7 = lookupTable[lifeRoot], v9 = lookupTable[fortuneRoot], v3 = lookupTable[vaultRoot];
        const v6 = getIntersection(v9, v3), v5 = getMissing([v9, v3]), v2 = getIntersection(v9, v7);
        const v4 = getIntersection(v7, v3), v1 = getIntersection(v2, v4), v8 = getMissing([v7, v9, v3]);

        // 轉換二宮對應地名
        const v2Mapped = v2 === "0" ? "無" : v2.split('').map(n => mapping[n] || n).join('、');

        document.getElementById('output').innerHTML = `
            <div class="divider"><strong>基礎：</strong> 卦:${卦} | 命:${lifeRoot} | 財:${fortuneRoot} | 庫:${vaultRoot}</div>
            <div class="divider"><strong>狀態：</strong> 名:${stateMap[sumToSingleDigit(rawFirst) - fortuneRoot]} | 字:${stateMap[sumToSingleDigit(rawMiddle) - vaultRoot]}</div>
            <div class="divider"><strong>適合城市：</strong>(${v2Mapped})</div>
            <div class="row-item">七宮: <span class="highlight">${v7}</span></div>
            <div class="row-item">九宮: <span class="highlight">${v9}</span></div>
            <div class="row-item">三宮: <span class="highlight">${v3}</span></div>
            <div class="row-item">六宮: <span class="highlight">${v6}</span></div>
            <div class="row-item">五宮: <span class="highlight">${v5}</span></div>
            <div class="row-item">二宮: <span class="highlight">${v2}</span></div>
            <div class="row-item">四宮: <span class="highlight">${v4}</span></div>
            <div class="row-item">一宮: <span class="highlight">${v1}</span></div>
            <div class="row-item">八宮: <span class="highlight">${v8}</span></div>
        `;
    }
</script>
</body>
</html>
