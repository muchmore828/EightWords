<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>命理演算系統</title>
    <style>
        .container { max-width: 600px; margin: auto; padding: 20px; font-family: sans-serif; }
        .section { border: 1px solid #ddd; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .result-box { background: #f0f8ff; padding: 15px; border-radius: 5px; border-left: 5px solid #007bff; }
    </style>
</head>
<body>

<div class="container">
    <div class="section" id="input-section">
        <h2>參數輸入區</h2>
        <div class="input-grid">
            <label>出生民國年: <input type="number" id="birthYear"></label>
            <label>性別: <select id="gender"><option value="男">男</option><option value="女">女</option></select></label>
            <label>出生順序: <input type="number" id="birthOrder"></label>
            <label>是否獨生: <input type="checkbox" id="isOnlyChild"></label>
            <label>名的筆劃數: <input type="number" id="firstStrokes"></label>
            <label>字的筆劃數: <input type="number" id="middleStrokes"></label>
        </div>
        <button onclick="calculateAll()" style="margin-top: 15px;">執行演算</button>
    </div>

    <div class="section" id="display-section">
        <h2>演算結果</h2>
        <div id="output" class="result-box">等待輸入與計算...</div>
    </div>
</div>

<script>
    // 輔助函式：加總至個位數
    function sumToSingleDigit(num) {
        let n = Math.abs(num);
        while (n > 9) {
            n = n.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }
        return n;
    }

    // 核心邏輯轉換
    function calculateAll() {
        const birthYear = document.getElementById('birthYear').value;
        const gender = document.getElementById('gender').value;
        const birthOrder = parseInt(document.getElementById('birthOrder').value);
        const isOnlyChild = document.getElementById('isOnlyChild').checked;
        const firstStrokes = parseInt(document.getElementById('firstStrokes').value);
        const middleStrokes = parseInt(document.getElementById('middleStrokes').value);

        // 1. 計算個序
        const westYear = parseInt(birthYear) + 1911;
        const personalSeq = sumToSingleDigit(sumToSingleDigit(westYear));

        // 2. 計算筆劃數值 (簡化邏輯)
        const nameSeq1 = sumToSingleDigit(firstStrokes);
        const nameSeq2 = sumToSingleDigit(middleStrokes);
        
        // 3. 取得數值 (假設 good_name 邏輯)
        const valA = 90; // 這裡可根據你的邏輯調整起始值
        const valB = 75; // 這裡可根據你的邏輯調整起始值

        // 顯示結果
        document.getElementById('output').innerHTML = `
            <p><strong>個序 (出生年):</strong> ${personalSeq}</p>
            <p><strong>名筆劃演算:</strong> ${nameSeq1}</p>
            <p><strong>字筆劃演算:</strong> ${nameSeq2}</p>
            <hr>
            <p>演算完成，系統已根據輸入的 ${birthYear} 年與筆劃數進行換算。</p>
        `;
    }
</script>
</body>
</html>
