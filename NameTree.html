<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>個人命理查詢系統</title>
    <style>
        body { font-family: "Microsoft JhengHei", sans-serif; font-size: 16px; line-height: 1.6; color: #333; }
        .container { max-width: 700px; margin: auto; padding: 20px; }
        .section { border: 2px solid #2c3e50; padding: 25px; margin-bottom: 20px; border-radius: 12px; background: #fff; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .display-area { background-color: #f9f9f9; padding: 25px; border-radius: 12px; border: 1px solid #ddd; }
        h2 { margin-top: 0; color: #2c3e50; }
        label { font-weight: bold; display: block; margin-bottom: 8px; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 15px; }
        button { width: 100%; padding: 15px; background-color: #2c3e50; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #34495e; }
        .result-item { margin: 10px 0; padding: 10px; border-bottom: 1px dashed #ccc; }
        .highlight { color: #d35400; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <div class="section">
        <h2>參數輸入區</h2>
        <div class="input-grid">
            <label>父親姓氏: <input type="text" id="fatherName"></label>
            <label>母親姓氏: <input type="text" id="motherName"></label>
            <label>性別: <select id="gender"><option value="男">男</option><option value="女">女</option></select></label>
            <label>出生順序: <input type="number" id="birthOrder"></label>
            <label>家中排行: <input type="number" id="familyRank"></label>
            <label>是否獨生: <select id="isOnlyChild"><option value="否">否</option><option value="是">是</option></select></label>
            <label>出生民國年: <input type="number" id="birthYear"></label>
            <label>名: <input type="text" id="firstName"></label>
            <label>字: <input type="text" id="middleName"></label>
            <label>名的筆劃數: <input type="number" id="firstStrokes"></label>
            <label>字的筆劃數: <input type="number" id="middleStrokes"></label>
        </div>
        <button onclick="calculate()">進行驗算與查詢</button>
    </div>

    <div class="section display-area">
        <h2>演算結果</h2>
        <div id="output">請輸入資料並執行演算...</div>
    </div>
</div>

<script>
    const surnameDB = { "陳": 16, "林": 8, "黃": 12, "李": 7, "王": 4 };

    function sumToSingleDigit(n) {
        let val = Math.abs(n);
        while (val > 9) {
            val = val.toString().split('').reduce((a, b) => parseInt(a) + parseInt(b), 0);
        }
        return val;
    }

    function calculate() {
        const birthYear = parseInt(document.getElementById('birthYear').value);
        const birthOrder = parseInt(document.getElementById('birthOrder').value);
        const westYear = birthYear + 1911;
        const personalSeq = sumToSingleDigit(westYear);

        const fName = document.getElementById('fatherName').value;
        const mName = document.getElementById('motherName').value;

        const checkSurname = (name) => {
            if (surnameDB.hasOwnProperty(name)) {
                let confirmVal = confirm(`${name}姓氏筆畫為 ${surnameDB[name]}，是否正確？`);
                return confirmVal ? surnameDB[name] : parseInt(prompt(`請手動輸入 ${name} 的正確筆劃數：`));
            } else {
                return parseInt(prompt(`資料庫內無「${name}」姓氏，請手動輸入其筆劃數：`));
            }
        };

        const fStrokes = checkSurname(fName);
        const mStrokes = checkSurname(mName);

        // 計算命數: 父親筆畫 + 母親筆畫 + 1 - 出生順序
        const lifeNumber = fStrokes + mStrokes + 1 - birthOrder;

        document.getElementById('output').innerHTML = `
            <div class="result-item">個序：<span class="highlight">${personalSeq}</span> (民國${birthYear}年)</div>
            <div class="result-item">父親筆畫：${fStrokes} | 母親筆畫：${mStrokes}</div>
            <div class="result-item">命數計算：${fStrokes} + ${mStrokes} + 1 - ${birthOrder} = <span class="highlight">${lifeNumber}</span></div>
        `;
    }
</script>
</body>
</html>
