<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經每日占卜</title>
    
    <script src="database.js"></script>

    <style>
        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background-color: #f7f3ed;
            color: #5a4b41;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(180, 160, 140, 0.15);
            text-align: center;
            border: 4px solid #f1e9db;
            box-sizing: border-box;
            margin-top: 40px;
        }
        h1 { font-size: 24px; color: #8c7662; margin-bottom: 5px; }
        .subtitle { font-size: 14px; color: #bfa895; margin-bottom: 25px; }
        .gua-display {
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            justify-content: center;
            min-height: 180px;
            background: #faf8f5;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px dashed #ebdcc7;
        }
        .yao-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 160px;
            height: 14px;
            margin: 4px 0;
            transition: all 0.3s ease;
        }
        .yao-row.active-change .yang-line,
        .yao-row.active-change .yin-line-left,
        .yao-row.active-change .yin-line-right {
            animation: pulse 1s infinite alternate;
            background-color: #deab80;
        }
        .yang-line { width: 100%; height: 100%; background-color: #8c7662; border-radius: 4px; }
        .yin-line-container { display: flex; justify-content: space-between; gap: 16px; width: 100%; height: 100%; }
        .yin-line-left, .yin-line-right { flex: 1; height: 100%; background-color: #8c7662; border-radius: 4px; }
        .yao-label { font-size: 11px; color: #bfa895; margin-left: 10px; width: 40px; text-align: left; line-height: 14px; flex-shrink: 0; }
        .action-btn {
            background-color: #d9c5b2; color: white; border: none; padding: 15px 40px; font-size: 18px;
            border-radius: 50px; cursor: pointer; box-shadow: 0 4px 10px rgba(217, 197, 178, 0.4);
            transition: all 0.2s; font-weight: bold; width: 80%;
        }
        .action-btn:hover:not(:disabled) { background-color: #cbb39c; transform: translateY(-2px); }
        .action-btn:disabled { background-color: #e0dcd5; color: #bfa895; cursor: not-allowed; box-shadow: none; }
        .action-btn.dice-mode { background-color: #b5c7bc; box-shadow: 0 4px 10px rgba(181, 199, 188, 0.4); }
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(90, 75, 65, 0.4); justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; z-index: 100;
        }
        .modal-content { background: white; padding: 30px; border-radius: 24px; max-width: 400px; width: 100%; text-align: center; border: 4px solid #f1e9db; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .modal-title { font-size: 22px; color: #8c7662; margin-bottom: 10px; font-weight: bold; }
        .res-overall-box { font-size: 14px; line-height: 1.6; color: #8c7662; background: #faf8f5; padding: 12px; border-radius: 12px; margin-bottom: 15px; text-align: justify; border-left: 4px solid #ebdcc7; }
        .modal-yao { font-size: 13px; color: #bfa895; margin-bottom: 15px; background: #f5f8f6; padding: 5px 15px; border-radius: 20px; display: inline-block; font-weight: bold; }
        .modal-advice { font-size: 16px; line-height: 1.6; color: #5a4b41; text-align: justify; margin-bottom: 25px; white-space: pre-line; }
        .close-btn { background: #ebdcc7; color: #5a4b41; border: none; padding: 12px 40px; border-radius: 50px; cursor: pointer; font-weight: bold; font-size: 16px; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.02); } }
    </style>
</head>
<body>

<div class="container">
    <h1>易經每日占卜</h1>
    <div class="subtitle">連續投擲 6 次硬幣，再擲 1 次骰子決定動爻</div>
    <div class="gua-display" id="guaDisplay">
        <div style="color: #d1c4b6; font-size: 14px; line-height: 140px;" id="placeholderText">請按下按鈕開始卜卦</div>
    </div>
    <button class="action-btn" id="actionBtn" onclick="handleActionClick()">🪙 開始投擲硬幣 (0/6)</button>
</div>

<div class="modal" id="resultModal">
    <div class="modal-content">
        <div class="modal-title" id="resGuaName">卦名</div>
        <div class="res-overall-box" id="resOverall">大局意象</div>
        <div class="modal-yao" id="resYaoName">動爻位置</div>
        <div class="modal-advice" id="resAdvice">宇宙的指引</div>
        <button class="close-btn" onclick="resetOracle()">重新占卜</button>
    </div>
</div>

<script>
let coinRolls = []; 
let diceResult = 0; 
let currentStep = 1; 
const yaoNames = ["", "初爻", "二爻", "三爻", "四爻", "五爻", "上爻"];

function rollThreeCoins() {
    const coin1 = Math.random() < 0.5;
    const coin2 = Math.random() < 0.5;
    const coin3 = Math.random() < 0.5;
    const headsCount = (coin1 ? 1 : 0) + (coin2 ? 1 : 0) + (coin3 ? 1 : 0);
    return (headsCount === 3 || headsCount === 1) ? 1 : 0;
}

function handleActionClick() {
    const btn = document.getElementById('actionBtn');
    const placeholder = document.getElementById('placeholderText');
    if (placeholder) placeholder.remove();

    if (currentStep <= 6) {
        const val = rollThreeCoins();
        coinRolls.push(val);
        drawYaoOnScreen(val, currentStep);
        if (currentStep < 6) {
            btn.innerHTML = `🪙 繼續投擲硬幣 (${currentStep}/6)`;
            currentStep++;
        } else {
            btn.innerHTML = `🎲 擲骰子決定動爻`;
            btn.classList.add('dice-mode');
            currentStep = 7; 
        }
        return;
    }

    if (currentStep === 7) {
        btn.disabled = true;
        btn.innerHTML = `🎲 正在解讀今日卦象...`;
        diceResult = Math.floor(Math.random() * 6) + 1;
        const targetRow = document.getElementById(`yao-${diceResult}`);
        if(targetRow) targetRow.classList.add('active-change');
        
        setTimeout(() => {
            calculateFinalResult(coinRolls, diceResult);
        }, 1000);
    }
}

function drawYaoOnScreen(val, step) {
    const display = document.getElementById('guaDisplay');
    const row = document.createElement('div');
    row.className = 'yao-row';
    row.id = `yao-${step}`;
    if (val === 1) {
        row.innerHTML = `<div class="yang-line"></div><div class="yao-label">${yaoNames[step]}</div>`;
    } else {
        row.innerHTML = `<div class="yin-line-container"><div class="yin-line-left"></div><div class="yin-line-right"></div></div><div class="yao-label">${yaoNames[step]}</div>`;
    }
    display.appendChild(row);
}

function calculateFinalResult(rolls, targetYao) {
    let guaCode = "";
    for (let i = 0; i < 6; i++) { guaCode += rolls[i]; }

    let db = window.eChingDatabase;
    let matchedGua = null;

    if (db) {
        let reverseGuaCode = guaCode.split('').reverse().join('');
        // 💡 內建正反雙通比對機制
        if (db[guaCode]) { matchedGua = db[guaCode]; } 
        else if (db[reverseGuaCode]) { matchedGua = db[reverseGuaCode]; }
    }

    if (!matchedGua) {
        const keysInDB = db ? Object.keys(db) : [];
        alert(`【解卦提示】\n目前搖出編碼：[${guaCode}]\n資料庫檔案目前成功讀取到了 [ ${keysInDB.length} ] 個卦。\n\n如果數字顯示為 0，代表 database.js 裡面有語法錯誤導致瀏覽器拒絕讀取，或是檔案沒有與 index.html 放在同一個資料夾喔！`);
        resetOracle();
        return;
    }

    document.getElementById('resGuaName').innerText = `今日求得：${matchedGua.guaName}`;
    document.getElementById('resOverall').innerText = matchedGua.overallPrompt;
    document.getElementById('resYaoName').innerText = `🎯 本卦動在：${yaoNames[targetYao]}`;
    document.getElementById('resAdvice').innerText = matchedGua.yaos[targetYao.toString()] || "今日平安順遂，靜心觀變。";
    document.getElementById('resultModal').style.display = 'flex';
}

function resetOracle() {
    coinRolls = []; diceResult = 0; currentStep = 1;
    const btn = document.getElementById('actionBtn');
    btn.disabled = false;
    btn.innerHTML = `🪙 開始投擲硬幣 (0/6)`;
    btn.classList.remove('dice-mode');
    document.getElementById('resultModal').style.display = 'none';
    const display = document.getElementById('guaDisplay');
    display.innerHTML = '<div style="color: #d1c4b6; font-size: 14px; line-height: 140px;" id="placeholderText">請按下按鈕開始卜卦</div>';
}
</script>
</body>
</html>
