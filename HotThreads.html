<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>多多老師的命理咖啡文案產生器</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        textarea { width: 100%; height: 100px; margin-bottom: 10px; padding: 10px; border: 2px solid #e67e22; border-radius: 5px; }
        button { padding: 10px 20px; background-color: #e67e22; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold; }
        button:hover { background-color: #d35400; }
        #output { margin-top: 20px; padding: 15px; background: #fff5eb; border-left: 5px solid #e67e22; white-space: pre-wrap; font-weight: 500; border-radius: 5px; color: #5d4037; }
    </style>
</head>
<body>

    <h2>🌶️ 多多老師的 Threads 辛辣文案產生器</h2>
    <p>請輸入你想吐槽的主題（例如：想復合的前任、一直在等好運的人）：</p>
    
    <textarea id="topicInput" placeholder="例如：三十歲還在迷惘..."></textarea>
    <br>
    <button onclick="generateContent()">開始看盤煮咖啡</button>

    <div id="output">等待老師開金口...</div>

    <script>
        // 設定 API 資訊
        const API_KEY = 'AIzaSyAhuM77nBRYX7TEnYufEgkf3VYVjlPhSG0'; 
        // 這裡改用 v1beta 以確保支援最新模型，若還是不行可改回 v1
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        async function generateContent() {
            const topic = document.getElementById('topicInput').value;
            const output = document.getElementById('output');
            
            if (!topic) { alert('老師，請先輸入主題！'); return; }
            
            output.innerText = "多多老師正在看盤並煮咖啡中...🌶️";

            // 直接將人設與指令封裝成一個強大的 Prompt
            const finalPrompt = `
                【角色設定】
                你是多多老師，經營「多肉咖啡」的命理師。
                語氣：辛辣、直接、看透世俗、不講雞湯。

                【寫作要求】
                1. 第一句話要震撼，直接點出讀者的弱點。
                2. 必須結合「命理邏輯」與「咖啡廳經營日常」做比喻。
                3. 結尾要帶到「來多肉咖啡看清現實」或提到貓店長「Kento」。
                4. 格式適合 Threads，多用加粗體，段落短。
                5. 絕對不要用「親愛的」、「加油」這種溫暖詞彙。

                【任務】
                請針對主題「${topic}」寫一段辛辣文案。
            `;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [{ text: finalPrompt }]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.9,
                            maxOutputTokens: 1000
                        }
                    })
                });

                const data = await response.json();
                
                // 解析回傳結果
                if (data.candidates && data.candidates[0].content.parts[0].text) {
                    output.innerText = data.candidates[0].content.parts[0].text;
                } else if (data.error) {
                    output.innerText = "老師，卦象顯示有誤：\n" + data.error.message;
                } else {
                    output.innerText = "這主題連 AI 都沈默了，請檢查輸入內容。";
                }

            } catch (error) {
                console.error('Error:', error);
                output.innerText = "連線失敗，請檢查網路或 API Key。";
            }
        }
    </script>
</body>
</html>
