<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡｜Gemini 辛辣文案產生器</title>
    <style>
        :root { --main-color: #d35400; --bg-color: #fafafa; }
        body { font-family: 'PingFang TC', sans-serif; background-color: var(--bg-color); max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--main-color); border-bottom: 2px solid var(--main-color); padding-bottom: 10px; }
        .setting-box { background: #f0f0f0; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input[type="password"], textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 120px; }
        button { width: 100%; background: var(--main-color); color: white; border: none; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; }
        #output { margin-top: 25px; padding: 20px; background: #fff5eb; border-left: 6px solid var(--main-color); white-space: pre-wrap; line-height: 1.8; border-radius: 4px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌶️ 多多老師的 Gemini 噴火機</h2>
    
    <div class="setting-box">
        <label>🔑 老師的 Gemini API Key：</label>
        <input type="password" id="apiKey" placeholder="AIzaSyBbS7Dzi4CYvTD5a0sg5VeuivzvAuZTK3c" />
    </div>

    <label>🔮 今天的吐槽主題：</label>
    <textarea id="topicInput" placeholder="例如：三十歲還在迷惘、想算命卻不想努力的人..."></textarea>
    
    <button onclick="generateContent()">撥動星盤，磨碎咖啡豆 ☕</button>

    <div id="output">等待老師開金口...</div>
</div>

<script>
    async function generateContent() {
        const apiKey = document.getElementById('apiKey').value;
        const topic = document.getElementById('topicInput').value;
        const output = document.getElementById('output');

        if (!apiKey) { alert('老師，鑰匙（Key）忘了拿！'); return; }
        if (!topic) { alert('老師，主題呢？'); return; }

        output.innerText = "多多老師正在看盤，這鍋咖啡肯定很辣...🌶️";

        // 2026 最穩定的模型路徑與精確 ID
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

        const systemPrompt = `
            你是多多老師，經營「多肉咖啡」的命理師。
            語氣：辛辣、直接、看透世俗、不講雞湯。
            要求：
            1. 第一句話要震撼，直接點出讀者的弱點。
            2. 必須結合「命理邏輯」與「咖啡廳經營日常」做比喻。
            3. 結尾提到貓店長「Kento」或「多肉咖啡」。
            4. 格式適合 Threads，多用粗體。
            5. 不要用「親愛的」、「加油」這種詞。
        `;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: `${systemPrompt}\n\n任務：針對「${topic}」寫一段辛辣文案。` }]
                    }]
                })
            });

            const data = await response.json();

            if (data.candidates && data.candidates[0].content.parts[0].text) {
                output.innerText = data.candidates[0].content.parts[0].text;
            } else if (data.error) {
                output.innerText = "卦象顯示錯誤：\n" + data.error.message;
            } else {
                output.innerText = "這主題連 Gemini 都沈默了，請檢查輸入。";
            }
        } catch (error) {
            output.innerText = "連線失敗，請檢查網路。";
        }
    }
</script>

</body>
</html>
