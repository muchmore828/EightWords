<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多肉咖啡｜辛辣文案產生器</title>
    <style>
        :root { --main-color: #d35400; --bg-color: #fafafa; }
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background-color: var(--bg-color); color: #333; max-width: 600px; margin: 40px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: var(--main-color); margin-top: 0; border-bottom: 2px solid var(--main-color); padding-bottom: 10px; }
        .setting-box { background: #eee; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
        input[type="password"], textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { height: 120px; resize: vertical; }
        button { width: 100%; background: var(--main-color); color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #a04000; }
        #output { margin-top: 25px; padding: 20px; background: #fff5eb; border-left: 6px solid var(--main-color); border-radius: 4px; white-space: pre-wrap; line-height: 1.8; color: #444; font-weight: 500; }
        .kento-tag { text-align: right; font-style: italic; color: #888; margin-top: 10px; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="card">
    <h2>🌶️ 多多老師的 Threads 噴火產生器</h2>
    
    <!-- 安全鑰匙孔：避免 Key 被硬編碼在程式中 -->
    <div class="setting-box">
        <label>🔑 老師的 API Key：</label>
        <input type="password" id="apiKey" placeholder="在此貼上 sk- 開頭的 Key" />
    </div>

    <label>🔮 今天的吐槽主題：</label>
    <textarea id="topicInput" placeholder="例如：三十歲還在問復合、想創業卻只會做夢的人..."></textarea>
    
    <button onclick="generateContent()">撥動星盤，煮杯濃縮 ☕</button>

    <div id="output">點擊按鈕，聽老師開金口...</div>
    <div class="kento-tag">—— 貓店長 Kento 監製 🐈</div>
</div>

<script>
    async function generateContent() {
        const apiKey = document.getElementById('apiKey').value;
        const topic = document.getElementById('topicInput').value;
        const output = document.getElementById('output');

        if (!apiKey) { alert('老師，鑰匙（Key）忘了拿！請先輸入 API Key。'); return; }
        if (!topic) { alert('老師，請先輸入主題！'); return; }

        output.innerText = "多多老師正在冷笑，咖啡豆磨碎中...🌶️";

        const systemPrompt = `
            你是多多老師，經營「多肉咖啡」的命理師。
            語氣：辛辣、直接、看透世俗、不講雞湯。
            要求：
            1. 第一句話要震撼，直接點出讀者的弱點（例如：你以為、別傻了）。
            2. 必須結合「命理邏輯」與「咖啡廳經營日常」做比喻。
            3. 結尾要帶到「來多肉咖啡看清現實」或提到貓店長「Kento」。
            4. 格式適合 Threads，多用粗體，段落極短。
            5. 嚴禁使用「親愛的」、「加油」、「溫暖」、「療癒」等詞彙。
        `;

        try {
            const response = await fetch('https://api.openai.com/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: "gpt-4o",
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: `針對「${topic}」寫一段適合 Threads 的辛辣文案。` }
                    ],
                    temperature: 0.85
                })
            });

            const data = await response.json();

            if (data.choices && data.choices[0].message.content) {
                output.innerText = data.choices[0].message.content;
            } else if (data.error) {
                output.innerText = "卦象出錯（API 報錯）：" + data.error.message;
            } else {
                output.innerText = "這主題連 GPT 都沈默了，請檢查輸入內容。";
            }
        } catch (error) {
            output.innerText = "連線失敗，可能苗栗的訊號被干擾了，請檢查網路。";
        }
    }
</script>

</body>
</html>
